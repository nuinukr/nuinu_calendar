<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nuinu — 상품 업데이트 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F4EF;
    --warm-white: #FDFCFA;
    --charcoal: #2A2A2A;
    --mid-gray: #888880;
    --light-gray: #E8E4DC;
    --accent: #B8A99A;
    --done: #7A9E87;
    --scheduled: #C4A882;
    --draft: #AAAAAA;
    --border: #DDD8CE;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--charcoal);
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--charcoal);
    color: var(--cream);
    padding: 28px 40px 22px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: baseline; gap: 16px; }
  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    letter-spacing: 6px;
    font-weight: 400;
  }
  .sub-title {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .header-right { display: flex; gap: 12px; align-items: center; }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; letter-spacing: 1px; color: #AAA;
  }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }

  /* MONTH NAV */
  .month-nav {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .month-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 2px;
  }
  .nav-btns { display: flex; gap: 8px; align-items: center; }
  .nav-btn {
    width: 34px; height: 34px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 15px;
    color: var(--charcoal);
    border-radius: 2px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { background: var(--charcoal); color: var(--cream); border-color: var(--charcoal); }

  .refresh-btn {
    background: var(--charcoal);
    color: var(--cream);
    border: none;
    padding: 0 18px;
    height: 34px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 2px;
    transition: opacity 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { opacity: 0.8; }
  .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

  .settings-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--cream);
    padding: 6px 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    margin-left: 8px;
  }
  .settings-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }

  /* CALENDAR GRID */
  .calendar-wrap { padding: 28px 40px 40px; position: relative; }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    margin-bottom: 2px;
  }
  .weekday {
    text-align: center;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--mid-gray);
    padding: 6px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-day {
    background: var(--warm-white);
    min-height: 130px;
    padding: 8px;
    border: 1px solid var(--border);
    position: relative;
    transition: border-color 0.15s;
  }
  .cal-day.other-month { background: var(--cream); opacity: 0.5; }
  .cal-day.today { border-color: var(--charcoal); }
  .cal-day:hover { border-color: var(--accent); }

  .day-num {
    font-size: 12px;
    font-weight: 400;
    color: var(--mid-gray);
    margin-bottom: 6px;
    display: block;
  }
  .cal-day.today .day-num {
    background: var(--charcoal);
    color: var(--cream);
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }

  .product-cards { display: flex; flex-direction: column; gap: 4px; }

  .product-card {
    border-radius: 2px;
    padding: 4px 6px;
    font-size: 10px;
    line-height: 1.4;
    cursor: pointer;
    transition: opacity 0.15s;
    position: relative;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .product-card:hover { opacity: 0.85; }

  .product-card.done { background: #EAF3EC; border-left: 2px solid var(--done); }
  .product-card.scheduled { background: #F8F0E4; border-left: 2px solid var(--scheduled); }
  .product-card.draft { background: #F0F0F0; border-left: 2px solid var(--draft); }

  .card-thumb {
    width: 24px; height: 24px;
    border-radius: 1px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--light-gray);
  }
  .card-thumb-placeholder {
    width: 24px; height: 24px;
    border-radius: 1px;
    background: var(--light-gray);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    color: var(--mid-gray);
  }
  .card-info { flex: 1; min-width: 0; }
  .card-code { font-size: 9px; color: var(--mid-gray); letter-spacing: 0.5px; }
  .card-name {
    font-size: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 90px;
  }

  .more-badge {
    font-size: 9px;
    color: var(--mid-gray);
    letter-spacing: 0.5px;
    padding: 2px 4px;
    background: var(--light-gray);
    border-radius: 2px;
    text-align: center;
  }

  /* LOADING & EMPTY STATES */
  .loading-state, .empty-state, .error-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--mid-gray);
  }
  .loading-state .spinner {
    display: inline-block;
    width: 30px; height: 30px;
    border: 2px solid var(--border);
    border-top-color: var(--charcoal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state h3, .error-state h3 {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--charcoal);
    margin-bottom: 8px;
    font-weight: 400;
  }
  .empty-state p, .error-state p { font-size: 13px; line-height: 1.6; }
  .error-state { color: #C17B7B; }

  /* DETAIL MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(42,42,42,0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--warm-white);
    width: 480px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal-header {
    background: var(--charcoal);
    color: var(--cream);
    padding: 20px 24px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 1px;
  }
  .modal-close {
    background: none; border: none;
    color: var(--cream); font-size: 20px;
    cursor: pointer; opacity: 0.7;
    line-height: 1;
  }
  .modal-close:hover { opacity: 1; }

  .detail-img { width: 100%; max-height: 300px; object-fit: cover; background: var(--light-gray); }
  .detail-body { padding: 16px 24px 24px; }
  .detail-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 12px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--mid-gray); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0; }
  .detail-val { font-weight: 400; text-align: right; word-break: break-word; }
  .status-badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; letter-spacing: 1px;
  }
  .status-badge.done { background: #EAF3EC; color: var(--done); }
  .status-badge.scheduled { background: #F8F0E4; color: #9A7850; }
  .status-badge.draft { background: #F0F0F0; color: #888; }

  /* SUMMARY BAR */
  .summary-bar {
    background: var(--warm-white);
    border-top: 1px solid var(--border);
    padding: 14px 40px;
    display: flex; gap: 32px;
    flex-wrap: wrap;
  }
  .summary-item { display: flex; align-items: center; gap: 8px; }
  .summary-count { font-family: 'Playfair Display', serif; font-size: 22px; }
  .summary-label { font-size: 11px; color: var(--mid-gray); letter-spacing: 1px; }

  .last-updated {
    font-size: 10px;
    color: var(--mid-gray);
    letter-spacing: 0.5px;
    margin-left: auto;
    align-self: center;
  }

  /* CONFIG PANEL (첫 셋업용) */
  .config-panel {
    padding: 60px 40px;
    text-align: center;
    max-width: 600px;
    margin: 0 auto;
  }
  .config-panel h2 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 400;
    margin-bottom: 12px;
  }
  .config-panel p { font-size: 13px; color: var(--mid-gray); line-height: 1.7; margin-bottom: 20px; }
  .config-panel input {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    background: var(--warm-white);
    font-size: 13px;
    font-family: inherit;
    border-radius: 2px;
    outline: none;
    margin-bottom: 12px;
  }
  .config-panel input:focus { border-color: var(--charcoal); }
  .config-panel button {
    background: var(--charcoal);
    color: var(--cream);
    border: none;
    padding: 12px 32px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 2px;
  }

  @media (max-width: 700px) {
    .header, .month-nav, .calendar-wrap, .summary-bar { padding-left: 16px; padding-right: 16px; }
    .cal-day { min-height: 80px; padding: 5px; }
    .brand { font-size: 20px; }
    .header-right { display: none; }
    .card-name { max-width: 55px; }
    .last-updated { width: 100%; margin: 8px 0 0; text-align: left; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <span class="brand">nuinu</span>
    <span class="sub-title">Product Update Calendar</span>
  </div>
  <div class="header-right">
    <div class="legend-item"><div class="legend-dot" style="background:var(--done)"></div>업로드 완료</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--scheduled)"></div>업로드 예정</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--draft)"></div>보류</div>
    <button onclick="resetSheetUrl()" title="시트 주소 변경" class="settings-btn">⚙ 시트 설정</button>
  </div>
</div>

<!-- MONTH NAV -->
<div class="month-nav">
  <div class="month-title" id="monthTitle"></div>
  <div style="display:flex;gap:10px;align-items:center;">
    <div class="nav-btns">
      <button class="nav-btn" onclick="changeMonth(-1)">←</button>
      <button class="nav-btn" onclick="changeMonth(1)">→</button>
      <button class="nav-btn" onclick="goToToday()" title="오늘로" style="width:auto;padding:0 10px;font-size:11px;letter-spacing:1px;">TODAY</button>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadFromSheet()">↻ 새로고침</button>
  </div>
</div>

<!-- CALENDAR -->
<div class="calendar-wrap">
  <div id="calContent">
    <!-- 초기엔 로딩 상태 -->
  </div>
</div>

<!-- SUMMARY BAR -->
<div class="summary-bar" id="summaryBar" style="display:none;">
  <div class="summary-item">
    <span class="summary-count" id="cntDone" style="color:var(--done)">0</span>
    <div><div class="summary-label">업로드 완료</div></div>
  </div>
  <div class="summary-item">
    <span class="summary-count" id="cntSched" style="color:var(--scheduled)">0</span>
    <div><div class="summary-label">업로드 예정</div></div>
  </div>
  <div class="summary-item">
    <span class="summary-count" id="cntDraft" style="color:var(--draft)">0</span>
    <div><div class="summary-label">보류</div></div>
  </div>
  <div class="summary-item">
    <span class="summary-count" id="cntTotal">0</span>
    <div><div class="summary-label">이번달 전체</div></div>
  </div>
  <div class="last-updated" id="lastUpdated"></div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="detailTitle">상품 상세</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<script>
/* =========================================================
   설정 영역 — 셋업 가이드 따라서 본인 시트 주소로 바꾸세요!
   ========================================================= */
const SHEET_CONFIG = {
  // 1단계: 구글 시트 "웹에 게시" 후 받은 CSV 주소 (또는 시트 ID)를 여기에 붙여넣으세요
  // 예시: "https://docs.google.com/spreadsheets/d/e/2PACX-xxxxx/pub?output=csv"
  CSV_URL: "",

  // 시트의 어떤 탭을 읽을지 (여러 탭이 있으면 gid 번호 지정. 첫 탭이면 그냥 0)
  // 이 값은 CSV_URL에 이미 gid 파라미터가 포함되어 있으면 무시됨
};

/* =========================================================
   여기서부터는 수정 안 하셔도 됩니다
   ========================================================= */

let currentYear, currentMonth;
let products = [];
const today = new Date();

function init() {
  currentYear = today.getFullYear();
  currentMonth = today.getMonth();

  if (!SHEET_CONFIG.CSV_URL) {
    showConfigPanel();
    return;
  }

  renderCalendarShell();
  loadFromSheet();
}

function showConfigPanel() {
  const currentUrl = SHEET_CONFIG.CSV_URL || localStorage.getItem('nuinu_sheet_url') || '';
  document.getElementById('calContent').innerHTML = `
    <div class="config-panel">
      <h2>${currentUrl ? '시트 주소 변경' : '환영합니다!'}</h2>
      <p>${currentUrl ? '현재 연결된 구글 시트 주소를 변경할 수 있습니다.' : '먼저 구글 시트 주소를 연결해주세요.'}<br>
      구글 시트에서 <b>파일 → 공유 → 웹에 게시 → CSV 형식</b>으로 게시한 URL을 아래에 붙여넣고 저장해주세요.</p>
      <input type="text" id="sheetUrlInput" placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?output=csv" value="${currentUrl}">
      <br>
      <button onclick="saveSheetUrl()">${currentUrl ? '저장' : '연결하기'}</button>
      ${currentUrl ? `<button onclick="cancelConfig()" style="background:transparent;color:var(--mid-gray);border:1px solid var(--border);margin-left:8px;">취소</button>` : ''}
      <p style="margin-top:24px;font-size:11px;">※ 이 설정은 이 브라우저에만 저장됩니다. HTML 파일을 수정해서 영구 설정도 가능해요.</p>
    </div>
  `;
}

function resetSheetUrl() {
  if (!confirm('시트 주소를 변경하시겠어요?\n(데이터는 구글 시트에 있으니 사라지지 않아요)')) return;
  showConfigPanel();
}

function cancelConfig() {
  renderCalendarShell();
  renderCalendar();
}

function saveSheetUrl() {
  const url = document.getElementById('sheetUrlInput').value.trim();
  if (!url) { alert('시트 주소를 입력해주세요.'); return; }
  SHEET_CONFIG.CSV_URL = url;
  localStorage.setItem('nuinu_sheet_url', url);
  renderCalendarShell();
  loadFromSheet();
}

// localStorage 에 저장된 URL도 확인
if (!SHEET_CONFIG.CSV_URL) {
  const saved = localStorage.getItem('nuinu_sheet_url');
  if (saved) SHEET_CONFIG.CSV_URL = saved;
}

function renderCalendarShell() {
  document.getElementById('calContent').innerHTML = `
    <div class="weekdays">
      <div class="weekday">SUN</div><div class="weekday">MON</div><div class="weekday">TUE</div>
      <div class="weekday">WED</div><div class="weekday">THU</div><div class="weekday">FRI</div>
      <div class="weekday">SAT</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  `;
  document.getElementById('summaryBar').style.display = 'flex';
}

/* ============ 구글 시트 CSV 불러오기 ============ */
async function loadFromSheet() {
  const btn = document.getElementById('refreshBtn');
  if (btn) btn.classList.add('loading');

  if (!SHEET_CONFIG.CSV_URL) { showConfigPanel(); return; }

  // 캐시 방지용 타임스탬프 추가
  const url = SHEET_CONFIG.CSV_URL + (SHEET_CONFIG.CSV_URL.includes('?') ? '&' : '?') + 't=' + Date.now();

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('시트를 불러올 수 없습니다');
    const csv = await res.text();
    products = parseCSV(csv);
    renderCalendar();
    document.getElementById('lastUpdated').textContent = '마지막 업데이트: ' + formatTime(new Date());
  } catch (err) {
    document.getElementById('calGrid').innerHTML = `
      <div class="error-state" style="grid-column:1/-1;">
        <h3>시트를 불러오지 못했어요</h3>
        <p>시트가 "웹에 게시"되어 있는지, URL이 맞는지 확인해주세요.<br>
        <span style="font-size:11px;opacity:0.7">에러: ${err.message}</span></p>
      </div>
    `;
  } finally {
    if (btn) btn.classList.remove('loading');
  }
}

/* ============ CSV 파싱 ============ */
function parseCSV(text) {
  const lines = [];
  let cur = '', inQuotes = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i+1];
    if (ch === '"' && inQuotes && next === '"') { cur += '"'; i++; continue; }
    if (ch === '"') { inQuotes = !inQuotes; continue; }
    if (ch === ',' && !inQuotes) { row.push(cur); cur = ''; continue; }
    if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && next === '\n') i++;
      row.push(cur); lines.push(row); cur = ''; row = []; continue;
    }
    cur += ch;
  }
  if (cur || row.length) { row.push(cur); lines.push(row); }

  if (lines.length < 2) return [];

  const headers = lines[0].map(h => h.trim());
  const items = [];
  for (let i = 1; i < lines.length; i++) {
    const row = lines[i];
    if (!row || row.every(c => !c || !c.trim())) continue;
    const obj = {};
    headers.forEach((h, idx) => obj[h] = (row[idx] || '').trim());
    items.push(normalizeProduct(obj));
  }
  return items.filter(p => p.date && p.name);
}

/* ============ 시트 데이터를 내부 포맷으로 변환 ============ */
function normalizeProduct(row) {
  // 헤더는 유연하게 받기 — 한글/영문 모두 허용
  const get = (keys) => {
    for (const k of keys) {
      for (const key in row) {
        if (key.replace(/\s/g,'').toLowerCase() === k.replace(/\s/g,'').toLowerCase()) return row[key];
      }
    }
    return '';
  };

  let status = get(['상태','status']).toLowerCase();
  if (status.includes('완료') || status.includes('done')) status = 'done';
  else if (status.includes('예정') || status.includes('scheduled')) status = 'scheduled';
  else if (status.includes('보류') || status.includes('준비') || status.includes('draft') || status.includes('hold')) status = 'draft';
  else status = 'scheduled';

  return {
    date: normalizeDate(get(['날짜','date'])),
    code: get(['상품코드','코드','code','productcode']),
    name: get(['상품명','이름','name','productname']),
    category: get(['카테고리','category']),
    size: get(['사이즈','size']),
    color: get(['색상','컬러','color']),
    status: status,
    image: convertDriveUrl(get(['사진url','사진','이미지','image','imageurl','photo'])),
    memo: get(['메모','memo','note'])
  };
}

/* ============ 날짜 포맷 정규화 ============ */
function normalizeDate(d) {
  if (!d) return '';
  d = d.trim();
  // YYYY-MM-DD, YYYY.MM.DD, YYYY/MM/DD 등 허용
  const m = d.match(/(\d{4})[\-\.\/\s]+(\d{1,2})[\-\.\/\s]+(\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  return d;
}

/* ============ 구글 드라이브 링크 → 이미지 직접 링크 변환 ============ */
function convertDriveUrl(url) {
  if (!url) return '';
  url = url.trim();
  // https://drive.google.com/file/d/FILE_ID/view 형태
  let m = url.match(/\/file\/d\/([^\/\?]+)/);
  if (m) return `https://lh3.googleusercontent.com/d/${m[1]}`;
  // ?id=FILE_ID 형태
  m = url.match(/[?&]id=([^&]+)/);
  if (m) return `https://lh3.googleusercontent.com/d/${m[1]}`;
  // 이미 직접 링크면 그대로
  return url;
}

/* ============ 달력 렌더 ============ */
function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function goToToday() {
  currentYear = today.getFullYear();
  currentMonth = today.getMonth();
  renderCalendar();
}

function renderCalendar() {
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('monthTitle').textContent = `${monthNames[currentMonth]} ${currentYear}`;

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

  const grid = document.getElementById('calGrid');
  if (!grid) { renderCalendarShell(); return renderCalendar(); }
  grid.innerHTML = '';

  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day';
    let dayNum, isCurrentMonth = true;

    if (i < firstDay) {
      dayNum = daysInPrev - firstDay + i + 1;
      isCurrentMonth = false;
      cell.classList.add('other-month');
    } else if (i >= firstDay + daysInMonth) {
      dayNum = i - firstDay - daysInMonth + 1;
      isCurrentMonth = false;
      cell.classList.add('other-month');
    } else {
      dayNum = i - firstDay + 1;
    }

    if (isCurrentMonth && dayNum === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
      cell.classList.add('today');
    }

    const numEl = document.createElement('span');
    numEl.className = 'day-num';
    numEl.textContent = dayNum;
    cell.appendChild(numEl);

    if (isCurrentMonth) {
      const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      const dayProducts = products.filter(p => p.date === dateStr);

      const cardsWrap = document.createElement('div');
      cardsWrap.className = 'product-cards';

      const showMax = 3;
      dayProducts.slice(0, showMax).forEach(p => {
        cardsWrap.appendChild(makeCard(p));
      });
      if (dayProducts.length > showMax) {
        const more = document.createElement('div');
        more.className = 'more-badge';
        more.textContent = `+${dayProducts.length - showMax} 더보기`;
        more.addEventListener('click', () => openDayList(dateStr, dayProducts));
        cardsWrap.appendChild(more);
      }

      cell.appendChild(cardsWrap);
    }

    grid.appendChild(cell);
  }

  updateSummary();
}

function makeCard(p) {
  const card = document.createElement('div');
  card.className = `product-card ${p.status}`;
  card.title = `${p.code} ${p.name}`;

  if (p.image) {
    const img = document.createElement('img');
    img.className = 'card-thumb';
    img.src = p.image;
    img.onerror = () => { img.style.display = 'none'; };
    card.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'card-thumb-placeholder';
    ph.textContent = p.category ? p.category[0] : '—';
    card.appendChild(ph);
  }

  const info = document.createElement('div');
  info.className = 'card-info';
  info.innerHTML = `<div class="card-code">${p.code || '코드없음'}</div><div class="card-name">${p.name || '상품명없음'}</div>`;
  card.appendChild(info);

  card.addEventListener('click', (e) => { e.stopPropagation(); openDetail(p); });
  return card;
}

function updateSummary() {
  const monthStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const mp = products.filter(p => p.date && p.date.startsWith(monthStr));
  document.getElementById('cntDone').textContent = mp.filter(p=>p.status==='done').length;
  document.getElementById('cntSched').textContent = mp.filter(p=>p.status==='scheduled').length;
  document.getElementById('cntDraft').textContent = mp.filter(p=>p.status==='draft').length;
  document.getElementById('cntTotal').textContent = mp.length;
}

/* ============ 상세 보기 ============ */
function openDetail(p) {
  const statusLabels = { done: '업로드 완료', scheduled: '업로드 예정', draft: '보류' };
  document.getElementById('detailTitle').textContent = p.name || '상품 상세';

  let html = '';
  if (p.image) html += `<img src="${p.image}" class="detail-img" onerror="this.style.display='none'">`;
  html += `<div class="detail-body">`;
  html += row('상태', `<span class="status-badge ${p.status}">${statusLabels[p.status]}</span>`);
  html += row('날짜', p.date);
  if (p.code) html += row('상품 코드', p.code);
  if (p.category) html += row('카테고리', p.category);
  if (p.size) html += row('사이즈', p.size);
  if (p.color) html += row('색상', p.color);
  if (p.memo) html += row('메모', p.memo);
  html += `</div>`;

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('open');
}

function openDayList(dateStr, list) {
  document.getElementById('detailTitle').textContent = dateStr + ' (' + list.length + '개)';
  let html = '<div class="detail-body" style="padding:16px;">';
  list.forEach(p => {
    const statusLabels = { done: '완료', scheduled: '예정', draft: '보류' };
    html += `
      <div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick='event.stopPropagation();document.getElementById("detailModal").classList.remove("open");setTimeout(()=>openDetail(${JSON.stringify(p).replace(/'/g,"\\'")}),100);'>
        ${p.image ? `<img src="${p.image}" style="width:48px;height:48px;object-fit:cover;background:var(--light-gray);" onerror="this.style.display='none'">` : `<div style="width:48px;height:48px;background:var(--light-gray);"></div>`}
        <div style="flex:1;">
          <div style="font-size:11px;color:var(--mid-gray);">${p.code || ''}</div>
          <div style="font-size:13px;margin-top:2px;">${p.name}</div>
          <div style="margin-top:4px;"><span class="status-badge ${p.status}">${statusLabels[p.status]}</span></div>
        </div>
      </div>
    `;
  });
  html += '</div>';
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('open');
}

function row(label, val) {
  return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-val">${val}</span></div>`;
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('open');
}

function formatTime(d) {
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

init();
</script>
</body>
</html>
