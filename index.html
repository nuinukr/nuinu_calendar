<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUINU — 상품 업데이트 캘린더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F4EF;
    --warm-white: #FDFCFA;
    --charcoal: #1A1A1A;
    --text: #1F1F1F;
    --mid-gray: #4A4A4A;
    --light-gray: #E8E4DC;
    --accent: #8B7355;
    --done: #4A7C5E;
    --done-bg: #D5E8DC;
    --scheduled: #A77745;
    --scheduled-bg: #F3E2C9;
    --draft: #6E6E6E;
    --draft-bg: #DEDEDE;
    --schedule: #5A6F93;
    --schedule-bg: #D8DFEB;
    --holiday: #B8443F;
    --holiday-bg: #F5DDDB;
    --saturday: #3B5A88;
    --border: #C9C2B3;
    --divider: #E0DACB;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Malgun Gothic', '맑은 고딕', 'Nanum Gothic', sans-serif;
    font-weight: 500;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ============ HEADER ============ */
  .header {
    background: var(--charcoal);
    color: #FFF;
    padding: 26px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .brand {
    font-family: 'Cinzel', serif;
    font-size: 38px;
    letter-spacing: 12px;
    font-weight: 500;
    color: #FFFFFF;
    padding-right: 6px;
  }
  .sub-title {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    font-size: 11px;
    letter-spacing: 2.5px;
    color: #D4C4A8;
    text-transform: uppercase;
    font-weight: 800;
    border-left: 1px solid rgba(255,255,255,0.3);
    padding-left: 16px;
  }

  .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .legend-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    letter-spacing: 0.5px;
    font-weight: 800;
    padding: 9px 16px;
    border-radius: 20px;
    color: #FFF;
  }
  .legend-pill.done { background: var(--done); }
  .legend-pill.scheduled { background: var(--scheduled); }
  .legend-pill.draft { background: var(--draft); }

  .header-btn {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.55);
    color: #FFF;
    padding: 9px 16px;
    font-family: 'Malgun Gothic', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.5px;
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.2s;
  }
  .header-btn:hover { background: rgba(255,255,255,0.15); border-color: #FFF; }
  .header-btn.primary { background: #FFF; color: var(--charcoal); border-color: #FFF; }
  .header-btn.primary:hover { background: #E8E2D3; }

  /* ============ SUMMARY BAR (상단) ============ */
  .summary-bar {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 22px 40px;
    display: flex;
    gap: 48px;
    flex-wrap: wrap;
    align-items: center;
  }
  .summary-item {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .summary-count {
    font-family: 'Cinzel', serif;
    font-size: 40px;
    font-weight: 600;
    line-height: 1;
  }
  .summary-label {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.3px;
    color: var(--text);
  }
  .summary-item.done .summary-count { color: var(--done); }
  .summary-item.scheduled .summary-count { color: var(--scheduled); }
  .summary-item.draft .summary-count { color: var(--draft); }
  .summary-item.total .summary-count { color: var(--charcoal); }

  .last-updated {
    font-size: 11px;
    color: var(--mid-gray);
    font-weight: 700;
    margin-left: auto;
  }

  /* ============ MONTH NAV ============ */
  .month-nav {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .month-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .year-month-display {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--charcoal);
    margin-right: 8px;
    min-width: 200px;
  }

  .nav-btn {
    width: 38px; height: 38px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    color: var(--charcoal);
    border-radius: 4px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover { background: var(--charcoal); color: #FFF; border-color: var(--charcoal); }
  .nav-btn.today {
    width: auto;
    padding: 0 16px;
    font-size: 12px;
    letter-spacing: 2px;
    font-family: 'Cinzel', serif;
    font-weight: 600;
  }

  .year-select, .month-select {
    border: 1.5px solid var(--border);
    background: var(--warm-white);
    padding: 9px 10px;
    font-family: 'Malgun Gothic', sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    cursor: pointer;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.15s;
  }
  .year-select:hover, .month-select:hover,
  .year-select:focus, .month-select:focus { border-color: var(--charcoal); }

  .refresh-btn {
    background: var(--charcoal);
    color: #FFF;
    border: none;
    padding: 0 18px;
    height: 38px;
    font-family: 'Malgun Gothic', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.5px;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { opacity: 0.85; }
  .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

  /* ============ CALENDAR ============ */
  .calendar-wrap { padding: 24px 40px 40px; position: relative; }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    margin-bottom: 2px;
  }
  .weekday {
    text-align: center;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--mid-gray);
    padding: 8px 0;
    font-weight: 800;
    font-family: 'Cinzel', serif;
  }
  .weekday.sun { color: var(--holiday); }
  .weekday.sat { color: var(--saturday); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-day {
    background: var(--warm-white);
    min-height: 140px;
    padding: 8px;
    border: 1px solid var(--border);
    position: relative;
    transition: border-color 0.15s;
  }
  .cal-day.other-month { background: #EEEAE1; opacity: 0.55; }
  .cal-day.today { border-color: var(--charcoal); border-width: 2px; padding: 7px; }
  .cal-day.holiday-day { background: #FEF5F5; }
  .cal-day:hover { border-color: var(--accent); }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
    min-height: 18px;
  }
  .day-num {
    font-size: 13px;
    font-weight: 800;
    color: var(--text);
    font-family: 'Cinzel', serif;
  }
  .day-num.sun, .day-num.holiday { color: var(--holiday); }
  .day-num.sat { color: var(--saturday); }
  .cal-day.today .day-num {
    background: var(--charcoal);
    color: #FFF;
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .holiday-label {
    font-size: 9px;
    color: var(--holiday);
    font-weight: 800;
    line-height: 1;
    text-align: right;
    max-width: 65%;
    word-break: keep-all;
  }

  .product-cards { display: flex; flex-direction: column; gap: 3px; }

  .product-card {
    border-radius: 3px;
    padding: 4px 6px;
    font-size: 10px;
    line-height: 1.4;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    position: relative;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .product-card:hover { opacity: 0.88; transform: translateX(1px); }

  .product-card.done { background: var(--done-bg); border-left: 3px solid var(--done); }
  .product-card.scheduled { background: var(--scheduled-bg); border-left: 3px solid var(--scheduled); }
  .product-card.draft { background: var(--draft-bg); border-left: 3px solid var(--draft); }
  .product-card.schedule { background: var(--schedule-bg); border-left: 3px solid var(--schedule); }

  .card-thumb {
    width: 24px; height: 24px;
    border-radius: 2px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--light-gray);
  }
  .card-thumb-placeholder {
    width: 24px; height: 24px;
    border-radius: 2px;
    background: var(--light-gray);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: var(--mid-gray);
    font-weight: 800;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-code { font-size: 9px; color: var(--mid-gray); letter-spacing: 0.5px; font-weight: 700; }
  .card-name {
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
  }
  .card-schedule-icon {
    width: 24px; height: 24px;
    background: var(--schedule);
    color: #FFF;
    border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    font-weight: 800;
  }

  .more-badge {
    font-size: 10px;
    color: var(--charcoal);
    letter-spacing: 0.3px;
    padding: 2px 5px;
    background: var(--light-gray);
    border-radius: 2px;
    text-align: center;
    font-weight: 800;
    cursor: pointer;
  }

  /* ============ LOADING & STATES ============ */
  .loading-state, .empty-state, .error-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--mid-gray);
    font-weight: 700;
  }
  .loading-state .spinner {
    display: inline-block;
    width: 30px; height: 30px;
    border: 2px solid var(--border);
    border-top-color: var(--charcoal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state h3, .error-state h3 {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    color: var(--charcoal);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .empty-state p, .error-state p { font-size: 13px; line-height: 1.6; font-weight: 500; }
  .error-state { color: var(--holiday); }

  /* ============ MODAL ============ */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,26,26,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--warm-white);
    width: 500px;
    max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    border-radius: 4px;
  }
  .modal-header {
    background: var(--charcoal);
    color: #FFF;
    padding: 22px 26px 18px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .modal-close {
    background: none; border: none;
    color: #FFF; font-size: 24px;
    cursor: pointer; opacity: 0.7;
    line-height: 1;
    font-weight: 300;
  }
  .modal-close:hover { opacity: 1; }

  .detail-img { width: 100%; max-height: 320px; object-fit: cover; background: var(--light-gray); }
  .detail-body { padding: 18px 26px 26px; }
  .detail-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid var(--divider); font-size: 14px; gap: 14px; font-weight: 600; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--mid-gray); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; flex-shrink: 0; font-weight: 800; }
  .detail-val { font-weight: 700; text-align: right; word-break: break-word; color: var(--text); }
  .status-badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; letter-spacing: 0.5px; font-weight: 800;
  }
  .status-badge.done { background: var(--done-bg); color: var(--done); }
  .status-badge.scheduled { background: var(--scheduled-bg); color: var(--scheduled); }
  .status-badge.draft { background: var(--draft-bg); color: var(--draft); }
  .status-badge.schedule { background: var(--schedule-bg); color: var(--schedule); }

  /* ============ REPORT MODAL ============ */
  .report-hero {
    background: linear-gradient(135deg, var(--charcoal), #3a3a3a);
    color: #FFF;
    padding: 30px 26px;
    text-align: center;
  }
  .report-year {
    font-family: 'Cinzel', serif;
    font-size: 44px;
    font-weight: 600;
    letter-spacing: 4px;
    line-height: 1;
  }
  .report-label {
    font-size: 11px;
    color: #C9B89C;
    letter-spacing: 3px;
    margin-top: 8px;
    font-weight: 800;
    text-transform: uppercase;
  }
  .report-year-picker {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 16px;
  }
  .report-year-picker select {
    background: rgba(255,255,255,0.1);
    color: #FFF;
    border: 1px solid rgba(255,255,255,0.4);
    padding: 6px 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 800;
    border-radius: 4px;
  }

  .report-body {
    padding: 24px 26px 28px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .report-stat {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 16px;
    text-align: center;
  }
  .report-stat .stat-count {
    font-family: 'Cinzel', serif;
    font-size: 34px;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 6px;
  }
  .report-stat .stat-label {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.3px;
  }
  .report-stat.total .stat-count { color: var(--done); }
  .report-stat.hold .stat-count { color: var(--draft); }

  .report-section {
    padding: 0 26px 26px;
  }
  .report-section h3 {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 2px;
    font-weight: 600;
    color: var(--charcoal);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--divider);
  }
  .report-month-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .report-month {
    background: var(--cream);
    padding: 10px 4px;
    text-align: center;
    border-radius: 3px;
    border: 1px solid var(--border);
  }
  .report-month-name {
    font-size: 10px;
    font-weight: 800;
    color: var(--mid-gray);
    font-family: 'Cinzel', serif;
    letter-spacing: 0.5px;
  }
  .report-month-count {
    font-size: 16px;
    font-weight: 800;
    color: var(--charcoal);
    margin-top: 2px;
  }

  /* ============ CONFIG PANEL ============ */
  .config-panel {
    padding: 60px 40px;
    max-width: 620px;
    margin: 0 auto;
  }
  .config-panel h2 {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 14px;
    text-align: center;
    letter-spacing: 3px;
  }
  .config-panel p { font-size: 13px; color: var(--mid-gray); line-height: 1.7; margin-bottom: 20px; font-weight: 600; text-align: center; }
  .config-panel label {
    display: block;
    font-size: 12px;
    font-weight: 800;
    margin: 16px 0 6px;
    letter-spacing: 0.5px;
  }
  .config-panel input {
    width: 100%;
    padding: 12px;
    border: 1.5px solid var(--border);
    background: var(--warm-white);
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    border-radius: 4px;
    outline: none;
  }
  .config-panel input:focus { border-color: var(--charcoal); }
  .config-panel .btn-row { text-align: center; margin-top: 24px; }
  .config-panel button {
    background: var(--charcoal);
    color: #FFF;
    border: none;
    padding: 13px 36px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
  }
  .config-panel button.cancel {
    background: transparent;
    color: var(--mid-gray);
    border: 1.5px solid var(--border);
    margin-left: 8px;
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 900px) {
    .header, .summary-bar, .month-nav, .calendar-wrap { padding-left: 20px; padding-right: 20px; }
    .summary-bar { gap: 24px; padding: 18px 20px; }
    .summary-count { font-size: 30px; }
    .brand { font-size: 28px; letter-spacing: 8px; }
    .cal-day { min-height: 90px; padding: 5px; }
    .card-name { max-width: 55px; font-size: 10px; }
    .legend-pill { font-size: 12px; padding: 7px 12px; }
    .last-updated { width: 100%; margin: 8px 0 0; text-align: left; }
    .year-month-display { font-size: 22px; min-width: 0; }
    .report-body { grid-template-columns: 1fr; }
    .report-month-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 500px) {
    .cal-day { min-height: 70px; padding: 3px; }
    .day-num { font-size: 11px; }
    .card-thumb, .card-thumb-placeholder, .card-schedule-icon { width: 20px; height: 20px; }
    .card-code { display: none; }
    .card-name { max-width: 45px; font-size: 9px; }
    .holiday-label { display: none; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <span class="brand">NUINU</span>
    <span class="sub-title">Product Update Calendar</span>
  </div>
  <div class="header-right">
    <span class="legend-pill done">● 업로드 완료</span>
    <span class="legend-pill scheduled">● 업로드 예정</span>
    <span class="legend-pill draft">● 보류</span>
    <button class="header-btn primary" onclick="openReport()">📊 연간 리포트</button>
    <button class="header-btn" onclick="resetSheetUrl()">⚙ 시트 설정</button>
  </div>
</div>

<!-- SUMMARY BAR (상단) -->
<div class="summary-bar" id="summaryBar" style="display:none;">
  <div class="summary-item done">
    <span class="summary-count" id="cntDone">0</span>
    <span class="summary-label">업로드 완료</span>
  </div>
  <div class="summary-item scheduled">
    <span class="summary-count" id="cntSched">0</span>
    <span class="summary-label">업로드 예정</span>
  </div>
  <div class="summary-item draft">
    <span class="summary-count" id="cntDraft">0</span>
    <span class="summary-label">보류</span>
  </div>
  <div class="summary-item total">
    <span class="summary-count" id="cntTotal">0</span>
    <span class="summary-label">이번달 전체</span>
  </div>
  <div class="last-updated" id="lastUpdated"></div>
</div>

<!-- MONTH NAV -->
<div class="month-nav" id="monthNav" style="display:none;">
  <div class="month-controls">
    <div class="year-month-display" id="yearMonthDisplay"></div>
    <select class="year-select" id="yearSelect" onchange="onYearChange()"></select>
    <select class="month-select" id="monthSelect" onchange="onMonthChange()"></select>
  </div>
  <div class="month-controls">
    <button class="nav-btn" onclick="changeMonth(-1)">←</button>
    <button class="nav-btn today" onclick="goToToday()">TODAY</button>
    <button class="nav-btn" onclick="changeMonth(1)">→</button>
    <button class="refresh-btn" id="refreshBtn" onclick="loadFromSheets()">↻ 새로고침</button>
  </div>
</div>

<!-- CALENDAR -->
<div class="calendar-wrap">
  <div id="calContent"></div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="detailTitle">상세</span>

/* =========================================================
   시트 불러오기
   ========================================================= */
async function loadFromSheets() {
  const btn = document.getElementById('refreshBtn');
  if (btn) btn.classList.add('loading');

  try {
    // 상품 시트
    const pUrl = SHEET_CONFIG.PRODUCT_CSV_URL + (SHEET_CONFIG.PRODUCT_CSV_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
    const pRes = await fetch(pUrl);
    if (!pRes.ok) throw new Error('상품 시트를 불러올 수 없습니다');
    const pCsv = await pRes.text();
    products = parseProducts(pCsv);

    // 일정 시트 (있으면)
    schedules = [];
    if (SHEET_CONFIG.SCHEDULE_CSV_URL) {
      try {
        const sUrl = SHEET_CONFIG.SCHEDULE_CSV_URL + (SHEET_CONFIG.SCHEDULE_CSV_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
        const sRes = await fetch(sUrl);
        if (sRes.ok) {
          const sCsv = await sRes.text();
          schedules = parseSchedules(sCsv);
        }
      } catch(e) { console.warn('일정 시트 로드 실패:', e); }
    }

    renderCalendar();
    document.getElementById('lastUpdated').textContent = '마지막 업데이트: ' + formatTime(new Date());
  } catch (err) {
    const grid = document.getElementById('calGrid');
    if (grid) {
      grid.innerHTML = `
        <div class="error-state" style="grid-column:1/-1;">
          <h3>시트를 불러오지 못했어요</h3>
          <p>시트가 "웹에 게시"되어 있는지, URL이 맞는지 확인해주세요.<br>
          <span style="font-size:11px;opacity:0.7">에러: ${err.message}</span></p>
        </div>
      `;
    }
  } finally {
    if (btn) btn.classList.remove('loading');
  }
}

/* =========================================================
   CSV 파싱
   ========================================================= */
function parseCSV(text) {
  const lines = [];
  let cur = '', inQuotes = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i+1];
    if (ch === '"' && inQuotes && next === '"') { cur += '"'; i++; continue; }
    if (ch === '"') { inQuotes = !inQuotes; continue; }
    if (ch === ',' && !inQuotes) { row.push(cur); cur = ''; continue; }
    if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && next === '\n') i++;
      row.push(cur); lines.push(row); cur = ''; row = []; continue;
    }
    cur += ch;
  }
  if (cur || row.length) { row.push(cur); lines.push(row); }
  if (lines.length < 2) return [];

  const headers = lines[0].map(h => h.trim());
  const items = [];
  for (let i = 1; i < lines.length; i++) {
    const row = lines[i];
    if (!row || row.every(c => !c || !c.trim())) continue;
    const obj = {};
    headers.forEach((h, idx) => obj[h] = (row[idx] || '').trim());
    items.push(obj);
  }
  return items;
}

function getField(row, keys) {
  for (const k of keys) {
    for (const key in row) {
      if (key.replace(/\s/g,'').toLowerCase() === k.replace(/\s/g,'').toLowerCase()) return row[key];
    }
  }
  return '';
}

function parseProducts(csv) {
  const raw = parseCSV(csv);
  return raw.map(row => {
    let status = getField(row, ['상태','status']).toLowerCase();
    if (status.includes('완료') || status.includes('done')) status = 'done';
    else if (status.includes('예정') || status.includes('scheduled')) status = 'scheduled';
    else if (status.includes('보류') || status.includes('준비') || status.includes('draft') || status.includes('hold')) status = 'draft';
    else status = 'scheduled';

    const code = getField(row, ['상품코드','코드','code','productcode']);
    const manualImage = getField(row, ['사진url','사진','이미지','image','imageurl','photo']);

    return {
      type: 'product',
      date: normalizeDate(getField(row, ['날짜','date'])),
      code: code,
      name: getField(row, ['상품명','이름','name','productname']),
      category: getField(row, ['카테고리','category']),
      size: getField(row, ['사이즈','size']),
      color: getField(row, ['색상','컬러','color']),
      status: status,
      image: manualImage ? convertDriveUrl(manualImage) : autoPhotoUrl(code),
      memo: getField(row, ['메모','memo','note'])
    };
  }).filter(p => p.date && p.name);
}

function parseSchedules(csv) {
  const raw = parseCSV(csv);
  return raw.map(row => ({
    type: 'schedule',
    date: normalizeDate(getField(row, ['날짜','date','startdate','시작일'])),
    endDate: normalizeDate(getField(row, ['종료일','enddate','end'])),
    name: getField(row, ['일정명','name','title','일정']),
    category: getField(row, ['카테고리','category']),
    memo: getField(row, ['메모','memo','note'])
  })).filter(s => s.date && s.name);
}

function normalizeDate(d) {
  if (!d) return '';
  d = d.trim();
  const m = d.match(/(\d{4})[\-\.\/\s]+(\d{1,2})[\-\.\/\s]+(\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  return d;
}

function convertDriveUrl(url) {
  if (!url) return '';
  url = url.trim();
  let m = url.match(/\/file\/d\/([^\/\?]+)/);
  if (m) return `https://lh3.googleusercontent.com/d/${m[1]}`;
  m = url.match(/[?&]id=([^&]+)/);
  if (m) return `https://lh3.googleusercontent.com/d/${m[1]}`;
  return url;
}

/* =========================================================
   사진 자동 매칭
   ========================================================= */
function autoPhotoUrl(code) {
  if (!code) return '';
  // 폴더 공유 상태에서는 파일명 검색이 제한되므로, 가장 안정적인 방식으로
  // 사용자가 수동 URL 입력 우선, 없으면 시도 가능하도록 반환
  // 실제 자동 매칭은 파일명을 정확히 알아야 하므로 안내만 처리
  return '';
}

/* =========================================================
   달력 렌더
   ========================================================= */
function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  document.getElementById('yearSelect').value = currentYear;
  document.getElementById('monthSelect').value = currentMonth;
  renderCalendar();
}

function goToToday() {
  currentYear = today.getFullYear();
  currentMonth = today.getMonth();
  document.getElementById('yearSelect').value = currentYear;
  document.getElementById('monthSelect').value = currentMonth;
  renderCalendar();
}

function renderCalendar() {
  const monthNames = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  document.getElementById('yearMonthDisplay').textContent = `${monthNames[currentMonth]} ${currentYear}`;

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

  const grid = document.getElementById('calGrid');
  if (!grid) return;
  grid.innerHTML = '';

  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day';
    let dayNum, isCurrentMonth = true, displayYear = currentYear, displayMonth = currentMonth;

    if (i < firstDay) {
      dayNum = daysInPrev - firstDay + i + 1;
      isCurrentMonth = false;
      displayMonth = currentMonth - 1;
      if (displayMonth < 0) { displayMonth = 11; displayYear--; }
      cell.classList.add('other-month');
    } else if (i >= firstDay + daysInMonth) {
      dayNum = i - firstDay - daysInMonth + 1;
      isCurrentMonth = false;
      displayMonth = currentMonth + 1;
      if (displayMonth > 11) { displayMonth = 0; displayYear++; }
      cell.classList.add('other-month');
    } else {
      dayNum = i - firstDay + 1;
    }

    const weekday = i % 7;
    const dateStr = `${displayYear}-${String(displayMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    const holiday = KR_HOLIDAYS[dateStr];

    if (holiday && isCurrentMonth) cell.classList.add('holiday-day');
    if (isCurrentMonth && dayNum === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
      cell.classList.add('today');
    }

    // Day header
    const dayHeader = document.createElement('div');
    dayHeader.className = 'day-header';

    const numEl = document.createElement('span');
    numEl.className = 'day-num';
    if (weekday === 0 || holiday) numEl.classList.add('sun');
    else if (weekday === 6) numEl.classList.add('sat');
    numEl.textContent = dayNum;
    dayHeader.appendChild(numEl);

    if (holiday && isCurrentMonth) {
      const hLabel = document.createElement('span');
      hLabel.className = 'holiday-label';
      hLabel.textContent = holiday;
      dayHeader.appendChild(hLabel);
    }

    cell.appendChild(dayHeader);

    if (isCurrentMonth) {
      const cardsWrap = document.createElement('div');
      cardsWrap.className = 'product-cards';

      // 해당 날짜의 상품
      const dayProducts = products.filter(p => p.date === dateStr);
      // 해당 날짜에 걸친 일정 (시작일~종료일 사이)
      const daySchedules = schedules.filter(s => {
        const start = s.date;
        const end = s.endDate || s.date;
        return dateStr >= start && dateStr <= end;
      });

      const allItems = [...daySchedules, ...dayProducts];
      const showMax = 3;

      allItems.slice(0, showMax).forEach(item => {
        cardsWrap.appendChild(makeCard(item));
      });

      if (allItems.length > showMax) {
        const more = document.createElement('div');
        more.className = 'more-badge';
        more.textContent = `+${allItems.length - showMax} 더보기`;
        more.addEventListener('click', () => openDayList(dateStr, allItems));
        cardsWrap.appendChild(more);
      }

      cell.appendChild(cardsWrap);
    }

    grid.appendChild(cell);
  }

  updateSummary();
}

function makeCard(item) {
  const card = document.createElement('div');

  if (item.type === 'schedule') {
    card.className = 'product-card schedule';
    card.title = item.name + (item.endDate ? ` (${item.date} ~ ${item.endDate})` : '');

    const icon = document.createElement('div');
    icon.className = 'card-schedule-icon';
    icon.textContent = '📅';
    card.appendChild(icon);

    const info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = `<div class="card-code">${item.category || '일정'}</div><div class="card-name">${item.name}</div>`;
    card.appendChild(info);
  } else {
    card.className = `product-card ${item.status}`;
    card.title = `${item.code} ${item.name}`;

    if (item.image) {
      const img = document.createElement('img');
      img.className = 'card-thumb';
      img.src = item.image;
      img.onerror = () => { img.style.display = 'none'; };
      card.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'card-thumb-placeholder';
      ph.textContent = item.category ? item.category[0] : '—';
      card.appendChild(ph);
    }

    const info = document.createElement('div');
    info.className = 'card-info';
    info.innerHTML = `<div class="card-code">${item.code || ''}</div><div class="card-name">${item.name || ''}</div>`;
    card.appendChild(info);
  }

  card.addEventListener('click', (e) => { e.stopPropagation(); openDetail(item); });
  return card;
}

function updateSummary() {
  const monthStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const mp = products.filter(p => p.date && p.date.startsWith(monthStr));
  document.getElementById('cntDone').textContent = mp.filter(p=>p.status==='done').length;
  document.getElementById('cntSched').textContent = mp.filter(p=>p.status==='scheduled').length;
  document.getElementById('cntDraft').textContent = mp.filter(p=>p.status==='draft').length;
  document.getElementById('cntTotal').textContent = mp.length;
}

/* =========================================================
   상세 모달
   ========================================================= */
function openDetail(item) {
  if (item.type === 'schedule') {
    document.getElementById('detailTitle').textContent = item.name;
    let html = '<div class="detail-body">';
    html += row('종류', `<span class="status-badge schedule">📅 일정</span>`);
    html += row('시작일', item.date);
    if (item.endDate && item.endDate !== item.date) html += row('종료일', item.endDate);
    if (item.category) html += row('카테고리', item.category);
    if (item.memo) html += row('메모', item.memo);
    html += '</div>';
    document.getElementById('detailContent').innerHTML = html;
  } else {
    const statusLabels = { done: '업로드 완료', scheduled: '업로드 예정', draft: '보류' };
    document.getElementById('detailTitle').textContent = item.name || '상품 상세';

    let html = '';
    if (item.image) html += `<img src="${item.image}" class="detail-img" onerror="this.style.display='none'">`;
    html += `<div class="detail-body">`;
    html += row('상태', `<span class="status-badge ${item.status}">${statusLabels[item.status]}</span>`);
    html += row('날짜', item.date);
    if (item.code) html += row('상품 코드', item.code);
    if (item.category) html += row('카테고리', item.category);
    if (item.size) html += row('사이즈', item.size);
    if (item.color) html += row('색상', item.color);
    if (item.memo) html += row('메모', item.memo);
    html += `</div>`;
    document.getElementById('detailContent').innerHTML = html;
  }
  document.getElementById('detailModal').classList.add('open');
}

function openDayList(dateStr, list) {
  document.getElementById('detailTitle').textContent = dateStr + ' (' + list.length + '건)';
  const statusLabels = { done: '완료', scheduled: '예정', draft: '보류' };
  let html = '<div class="detail-body" style="padding:16px 20px;">';
  list.forEach((item, idx) => {
    const isSchedule = item.type === 'schedule';
    html += `
      <div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--divider);cursor:pointer;" onclick='showFromList(${idx})'>
        ${isSchedule ? 
          `<div style="width:48px;height:48px;background:var(--schedule);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:3px;">📅</div>` :
          (item.image ? `<img src="${item.image}" style="width:48px;height:48px;object-fit:cover;background:var(--light-gray);border-radius:3px;" onerror="this.style.display='none'">` : `<div style="width:48px;height:48px;background:var(--light-gray);border-radius:3px;"></div>`)
        }
        <div style="flex:1;">
          <div style="font-size:11px;color:var(--mid-gray);font-weight:700;">${isSchedule ? (item.category || '일정') : (item.code || '')}</div>
          <div style="font-size:14px;margin-top:2px;font-weight:700;">${item.name}</div>
          <div style="margin-top:5px;"><span class="status-badge ${isSchedule ? 'schedule' : item.status}">${isSchedule ? '일정' : statusLabels[item.status]}</span></div>
        </div>
      </div>
    `;
  });
  html += '</div>';
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('open');
  window._currentDayList = list;
}

function showFromList(idx) {
  const item = window._currentDayList?.[idx];
  if (!item) return;
  closeModal('detailModal');
  setTimeout(() => openDetail(item), 150);
}

function row(label, val) {
  return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-val">${val}</span></div>`;
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

/* =========================================================
   연간 리포트
   ========================================================= */
function openReport(year) {
  year = year || currentYear;
  renderReport(year);
  document.getElementById('reportModal').classList.add('open');
}

function renderReport(year) {
  const yearProducts = products.filter(p => p.date && p.date.startsWith(year + '-'));
  const total = yearProducts.length;
  const done = yearProducts.filter(p => p.status === 'done').length;
  const scheduled = yearProducts.filter(p => p.status === 'scheduled').length;
  const hold = yearProducts.filter(p => p.status === 'draft').length;

  // 월별 집계
  const byMonth = Array(12).fill(0);
  const holdByMonth = Array(12).fill(0);
  yearProducts.forEach(p => {
    const m = parseInt(p.date.split('-')[1]) - 1;
    if (!isNaN(m)) {
      byMonth[m]++;
      if (p.status === 'draft') holdByMonth[m]++;
    }
  });

  const thisY = today.getFullYear();
  let yearOptions = '';
  for (let y = thisY - 2; y <= thisY + 3; y++) {
    yearOptions += `<option value="${y}" ${y === year ? 'selected' : ''}>${y}</option>`;
  }

  const monthNames = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  let monthHtml = '';
  for (let m = 0; m < 12; m++) {
    monthHtml += `
      <div class="report-month">
        <div class="report-month-name">${monthNames[m]}</div>
        <div class="report-month-count">${byMonth[m]}</div>
      </div>
    `;
  }

  document.getElementById('reportContent').innerHTML = `
    <div class="report-hero">
      <div class="report-year">${year}</div>
      <div class="report-label">Annual Performance</div>
      <div class="report-year-picker">
        <select onchange="openReport(parseInt(this.value))">${yearOptions}</select>
      </div>
    </div>
    <div class="report-body">
      <div class="report-stat total">
        <div class="stat-count">${total}</div>
        <div class="stat-label">연간 업로드 총 상품</div>
      </div>
      <div class="report-stat hold">
        <div class="stat-count">${hold}</div>
        <div class="stat-label">연간 보류 상품</div>
      </div>
    </div>
    <div class="report-body" style="padding-top:0;">
      <div class="report-stat" style="border-color:var(--done);">
        <div class="stat-count" style="color:var(--done);">${done}</div>
        <div class="stat-label">업로드 완료</div>
      </div>
      <div class="report-stat" style="border-color:var(--scheduled);">
        <div class="stat-count" style="color:var(--scheduled);">${scheduled}</div>
        <div class="stat-label">업로드 예정</div>
      </div>
    </div>
    <div class="report-section">
      <h3>MONTHLY BREAKDOWN</h3>
      <div class="report-month-grid">${monthHtml}</div>
    </div>
  `;
}

function formatTime(d) {
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

init();
</script>
</body>
</html>
