<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUINU — CALENDAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  /* Jazmin Regular (FONTSPRINGDEMO) */
  @font-face {
    font-family: 'Jazmin';
    src: url('FONTSPRINGDEMO-JazminRegular.woff2') format('woff2'),
         url('FONTSPRINGDEMO-JazminRegular.woff') format('woff');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --cream: #F7F4EF;
    --warm-white: #FDFCFA;
    --charcoal: #1A1A1A;
    --text: #1F1F1F;
    --mid-gray: #4A4A4A;
    --light-gray: #E8E4DC;
    --accent: #8B7355;
    --done: #4A7C5E;
    --done-bg: #D5E8DC;
    --scheduled: #A77745;
    --scheduled-bg: #F3E2C9;
    --draft: #6E6E6E;
    --draft-bg: #DEDEDE;
    --schedule: #5A6F93;
    --schedule-bg: #D8DFEB;
    --holiday: #B8443F;
    --holiday-bg: #F5DDDB;
    --saturday: #3B5A88;
    --border: #C9C2B3;
    --divider: #E0DACB;
    --highlight: #FFE066;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--text);
    font-family: 'Malgun Gothic', '맑은 고딕', 'Nanum Gothic', sans-serif;
    font-weight: 500;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ============ HEADER ============ */
  .header {
    background: var(--charcoal);
    color: #FFF;
    padding: 26px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .brand {
    font-family: 'Jazmin', 'Cormorant Garamond', serif;
    font-size: 42px;
    letter-spacing: 3px;
    font-weight: 400;
    color: #FFFFFF;
    padding-right: 4px;
    line-height: 1;
  }
  .sub-title {
    font-family: 'Jazmin', 'Cormorant Garamond', serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: #D4C4A8;
    text-transform: uppercase;
    font-weight: 400;
    border-left: 1px solid rgba(255,255,255,0.3);
    padding-left: 16px;
    line-height: 1;
  }

  .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .legend-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    letter-spacing: 0.5px;
    font-weight: 800;
    padding: 9px 16px;
    border-radius: 20px;
    color: #FFF;
  }
  .legend-pill.done { background: var(--done); }
  .legend-pill.scheduled { background: var(--scheduled); }
  .legend-pill.draft { background: var(--draft); }

  .header-btn {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.55);
    color: #FFF;
    padding: 9px 16px;
    font-family: 'Malgun Gothic', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.5px;
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
  }
  .header-btn:hover { background: rgba(255,255,255,0.15); border-color: #FFF; }
  .header-btn.primary { background: #FFF; color: var(--charcoal); border-color: #FFF; }
  .header-btn.primary:hover { background: #E8E2D3; }
  .header-btn.sheet { background: #4A7C5E; border-color: #4A7C5E; }
  .header-btn.sheet:hover { background: #3D6B4E; border-color: #3D6B4E; }

  /* ============ SEARCH BAR ============ */
  .search-bar {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 14px 40px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-bar input {
    flex: 1;
    min-width: 200px;
    padding: 11px 16px;
    border: 1.5px solid var(--border);
    background: var(--cream);
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    border-radius: 4px;
    outline: none;
  }
  .search-bar input:focus { border-color: var(--charcoal); background: #FFF; }
  .search-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .search-tag {
    padding: 6px 12px;
    border: 1.5px solid var(--border);
    background: var(--warm-white);
    font-size: 12px;
    font-weight: 700;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--mid-gray);
  }
  .search-tag.active {
    background: var(--charcoal);
    color: #FFF;
    border-color: var(--charcoal);
  }
  .search-tag:hover:not(.active) { border-color: var(--charcoal); color: var(--charcoal); }
  .search-clear {
    padding: 10px 14px;
    background: transparent;
    border: 1.5px solid var(--border);
    font-size: 12px;
    font-weight: 700;
    border-radius: 4px;
    cursor: pointer;
    color: var(--mid-gray);
    font-family: inherit;
  }
  .search-clear:hover { border-color: var(--holiday); color: var(--holiday); }

  /* ============ SEARCH RESULTS ============ */
  .search-results {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    max-height: 320px;
    overflow-y: auto;
    display: none;
  }
  .search-results.active { display: block; }
  .search-results-header {
    padding: 12px 40px;
    font-size: 12px;
    font-weight: 800;
    color: var(--mid-gray);
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--cream);
    position: sticky;
    top: 0;
    border-bottom: 1px solid var(--border);
  }
  .search-result-item {
    padding: 12px 40px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--divider);
    transition: background 0.15s;
  }
  .search-result-item:hover { background: var(--cream); }
  .search-result-item:last-child { border-bottom: none; }
  .search-thumb {
    width: 44px; height: 44px;
    border-radius: 3px;
    object-fit: cover;
    background: var(--light-gray);
    flex-shrink: 0;
  }
  .search-thumb-placeholder {
    width: 44px; height: 44px;
    border-radius: 3px;
    background: var(--light-gray);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 800;
    color: var(--mid-gray);
  }
  .search-thumb-schedule {
    width: 44px; height: 44px;
    background: var(--schedule);
    color: #FFF;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .search-result-info { flex: 1; min-width: 0; }
  .search-result-code {
    font-size: 12px;
    color: var(--mid-gray);
    font-weight: 800;
    letter-spacing: 0.3px;
    margin-bottom: 2px;
  }
  .search-result-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .search-result-meta {
    font-size: 11px;
    color: var(--mid-gray);
    font-weight: 700;
    margin-top: 2px;
  }
  .search-result-badge {
    flex-shrink: 0;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.3px;
  }

  /* ============ SUMMARY BAR ============ */
  .summary-bar {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 22px 40px;
    display: flex;
    gap: 48px;
    flex-wrap: wrap;
    align-items: center;
  }
  .summary-item {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .summary-count {
    font-family: 'Cinzel', serif;
    font-size: 40px;
    font-weight: 600;
    line-height: 1;
  }
  .summary-label {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.3px;
    color: var(--text);
  }
  .summary-item.done .summary-count { color: var(--done); }
  .summary-item.scheduled .summary-count { color: var(--scheduled); }
  .summary-item.draft .summary-count { color: var(--draft); }
  .summary-item.total .summary-count { color: var(--charcoal); }

  .last-updated {
    font-size: 11px;
    color: var(--mid-gray);
    font-weight: 700;
    margin-left: auto;
  }

  /* ============ MONTH NAV ============ */
  .month-nav {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .month-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .year-month-display {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--charcoal);
    margin-right: 8px;
    min-width: 200px;
  }

  .nav-btn {
    width: 38px; height: 38px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
    color: var(--charcoal);
    border-radius: 4px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit;
  }
  .nav-btn:hover { background: var(--charcoal); color: #FFF; border-color: var(--charcoal); }
  .nav-btn.today {
    width: auto;
    padding: 0 16px;
    font-size: 12px;
    letter-spacing: 2px;
    font-family: 'Cinzel', serif;
    font-weight: 600;
  }

  .year-select, .month-select {
    border: 1.5px solid var(--border);
    background: var(--warm-white);
    padding: 9px 10px;
    font-family: 'Malgun Gothic', sans-serif;
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    cursor: pointer;
    border-radius: 4px;
    outline: none;
  }
  .year-select:hover, .month-select:hover { border-color: var(--charcoal); }

  .refresh-btn {
    background: var(--charcoal);
    color: #FFF;
    border: none;
    padding: 0 18px;
    height: 38px;
    font-family: 'Malgun Gothic', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.5px;
    cursor: pointer;
    border-radius: 4px;
    transition: opacity 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { opacity: 0.85; }
  .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

  /* ============ CALENDAR ============ */
  .calendar-wrap { padding: 24px 40px 40px; position: relative; }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    margin-bottom: 2px;
  }
  .weekday {
    text-align: center;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--mid-gray);
    padding: 8px 0;
    font-weight: 800;
    font-family: 'Cinzel', serif;
  }
  .weekday.sun { color: var(--holiday); }
  .weekday.sat { color: var(--saturday); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    position: relative;
  }

  .cal-day {
    background: var(--warm-white);
    min-height: 170px;
    padding: 10px;
    border: 1px solid var(--border);
    position: relative;
    transition: border-color 0.15s, background 0.4s;
    overflow: hidden;
  }
  .cal-day.other-month { background: #EEEAE1; opacity: 0.55; }
  .cal-day.today { border-color: var(--charcoal); border-width: 2px; padding: 9px; }
  .cal-day.holiday-day { background: #FEF5F5; }
  .cal-day:hover { border-color: var(--accent); }
  .cal-day.highlight-day {
    animation: highlightPulse 1.8s ease 3;
  }
  @keyframes highlightPulse {
    0%, 100% { background: var(--warm-white); }
    50% { background: var(--highlight); }
  }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
    min-height: 20px;
  }
  .day-num {
    font-size: 15px;
    font-weight: 800;
    color: var(--text);
    font-family: 'Cinzel', serif;
  }
  .day-num.sun, .day-num.holiday { color: var(--holiday); }
  .day-num.sat { color: var(--saturday); }
  .cal-day.today .day-num {
    background: var(--charcoal);
    color: #FFF;
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .holiday-label {
    font-size: 10px;
    color: var(--holiday);
    font-weight: 800;
    line-height: 1.1;
    text-align: right;
    max-width: 65%;
    word-break: keep-all;
  }

  /* 일정 바 — 연결된 모양 */
  .schedule-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    padding: 32px 0 0;
    z-index: 1;
  }
  .schedule-row {
    position: absolute;
    height: 22px;
    display: flex;
    align-items: center;
    pointer-events: auto;
    cursor: pointer;
    padding: 0 4px;
  }
  .schedule-row-bar {
    width: 100%;
    height: 22px;
    background: var(--schedule-bg);
    color: var(--schedule);
    font-size: 12px;
    font-weight: 800;
    display: flex;
    align-items: center;
    padding: 0 10px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    transition: opacity 0.15s;
  }
  .schedule-row-bar.has-left { border-left: 3px solid var(--schedule); padding-left: 8px; }
  .schedule-row-bar.rounded-left { border-top-left-radius: 3px; border-bottom-left-radius: 3px; }
  .schedule-row-bar.rounded-right { border-top-right-radius: 3px; border-bottom-right-radius: 3px; }
  .schedule-row:hover .schedule-row-bar { opacity: 0.85; }

  .product-cards {
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    z-index: 2;
  }

  .product-card {
    border-radius: 3px;
    padding: 5px 7px;
    font-size: 12px;
    line-height: 1.4;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .product-card:hover { opacity: 0.88; transform: translateX(1px); }

  .product-card.done { background: var(--done-bg); border-left: 3px solid var(--done); }
  .product-card.scheduled { background: var(--scheduled-bg); border-left: 3px solid var(--scheduled); }
  .product-card.draft { background: var(--draft-bg); border-left: 3px solid var(--draft); }

  .card-thumb {
    width: 32px; height: 32px;
    border-radius: 2px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--light-gray);
  }
  .card-thumb-placeholder {
    width: 32px; height: 32px;
    border-radius: 2px;
    background: var(--light-gray);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: var(--mid-gray);
    font-weight: 800;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-code {
    font-size: 13px;
    color: var(--text);
    letter-spacing: 0.3px;
    font-weight: 800;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-sub {
    font-size: 11px;
    color: var(--mid-gray);
    font-weight: 700;
    margin-top: 1px;
  }

  .more-badge {
    font-size: 12px;
    color: var(--charcoal);
    letter-spacing: 0.3px;
    padding: 3px 6px;
    background: var(--light-gray);
    border-radius: 2px;
    text-align: center;
    font-weight: 800;
    cursor: pointer;
  }

  /* ============ LOADING & STATES ============ */
  .loading-state, .empty-state, .error-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--mid-gray);
    font-weight: 700;
  }
  .loading-state .spinner {
    display: inline-block;
    width: 30px; height: 30px;
    border: 2px solid var(--border);
    border-top-color: var(--charcoal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state h3, .error-state h3 {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    color: var(--charcoal);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .empty-state p, .error-state p { font-size: 13px; line-height: 1.6; font-weight: 500; }
  .error-state { color: var(--holiday); }

  /* ============ MODAL ============ */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,26,26,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--warm-white);
    width: 520px;
    max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    border-radius: 4px;
    position: relative;
  }
  .modal.wide { width: 680px; }

  .modal-header {
    background: var(--charcoal);
    color: #FFF;
    padding: 22px 26px 18px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .modal-close {
    background: none; border: none;
    color: #FFF; font-size: 24px;
    cursor: pointer; opacity: 0.7;
    line-height: 1;
    font-weight: 300;
  }
  .modal-close:hover { opacity: 1; }

  .detail-img-wrap {
    padding: 20px 26px 0;
    background: var(--warm-white);
  }
  .detail-img {
    width: 100%;
    max-height: 360px;
    object-fit: contain;
    background: #FFFFFF;
    border: 1px solid var(--divider);
    border-radius: 4px;
    display: block;
  }
  .detail-body { padding: 18px 26px 20px; }
  .detail-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid var(--divider); font-size: 14px; gap: 14px; font-weight: 600; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--mid-gray); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; flex-shrink: 0; font-weight: 800; min-width: 90px; }
  .detail-val { font-weight: 700; text-align: right; word-break: break-word; color: var(--text); }
  .detail-val.empty { color: #B5AFA0; font-weight: 500; }
  .status-badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; letter-spacing: 0.5px; font-weight: 800;
  }
  .status-badge.done { background: var(--done-bg); color: var(--done); }
  .status-badge.scheduled { background: var(--scheduled-bg); color: var(--scheduled); }
  .status-badge.draft { background: var(--draft-bg); color: var(--draft); }
  .status-badge.schedule { background: var(--schedule-bg); color: var(--schedule); }

  .modal-footer {
    padding: 14px 26px;
    border-top: 1px solid var(--divider);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .modal-btn {
    padding: 9px 18px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.5px;
    border-radius: 4px;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--warm-white);
    color: var(--text);
    font-family: inherit;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .modal-btn:hover { border-color: var(--charcoal); }
  .modal-btn.primary {
    background: var(--done);
    color: #FFF;
    border-color: var(--done);
  }
  .modal-btn.primary:hover { background: #3D6B4E; border-color: #3D6B4E; }

  /* ============ REPORT MODAL ============ */
  .report-hero {
    background: linear-gradient(135deg, var(--charcoal), #3a3a3a);
    color: #FFF;
    padding: 30px 26px;
    text-align: center;
  }
  .report-year {
    font-family: 'Cinzel', serif;
    font-size: 44px;
    font-weight: 600;
    letter-spacing: 4px;
    line-height: 1;
  }
  .report-label {
    font-size: 11px;
    color: #C9B89C;
    letter-spacing: 3px;
    margin-top: 8px;
    font-weight: 800;
    text-transform: uppercase;
  }
  .report-year-picker {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 16px;
  }
  .report-year-picker select {
    background: #FFF;
    color: #1A1A1A;

  /* ============ CONFIG PANEL ============ */

    padding: 60px 40px;

    margin: 0 auto;
  }
  .config-panel h2 {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 14px;
    text-align: center;
    letter-spacing: 3px;
  }
  .config-panel .config-desc {
    font-size: 13px;
    color: var(--mid-gray);
    line-height: 1.7;
    margin-bottom: 20px;
    font-weight: 600;

    display: block;
    font-size: 12px;
    font-weight: 800;
    margin: 16px 0 6px;
    letter-spacing: 0.5px;

    width: 100%;
    padding: 12px;

    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    border-radius: 4px;
    outline: none;
  }
  .config-panel input:focus { border-color: var(--charcoal); }
  .config-panel .btn-row { text-align: center; margin-top: 24px; }
  .config-panel button {
    background: var(--charcoal);
    color: #FFF;
    border: none;
    padding: 13px 36px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 4px;
  }
  .config-panel button.cancel {
    background: transparent;
    color: var(--mid-gray);
    border: 1.5px solid var(--border);
    margin-left: 8px;

  /* ============ RESPONSIVE ============ */
  @media (max-width: 900px) {
    .header, .summary-bar, .month-nav, .calendar-wrap, .search-bar { padding-left: 20px; padding-right: 20px; }
    .search-results-header, .search-result-item { padding-left: 20px; padding-right: 20px; }

    .report-body { grid-template-columns: 1fr; }

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <span class="brand">NUINU</span>
    <span class="sub-title">CALENDAR</span>
  </div>
  <div class="header-right">
    <span class="legend-pill done">● 업로드 완료</span>
    <span class="legend-pill scheduled">● 업로드 예정</span>
    <span class="legend-pill draft">● 보류</span>
    <a href="https://docs.google.com/spreadsheets/d/1L-M36PIt3xd52FnkDE5wtJ68omApqtG5SpRtOs8tcmA/edit" target="_blank" class="header-btn sheet">📝 시트 수정</a>
    <button class="header-btn primary" onclick="openReport()">📊 연간 리포트</button>
    <button class="header-btn" onclick="resetSheetUrl()">⚙ 시트 설정</button>

</div>

<!-- SEARCH BAR -->
<div class="search-bar" id="searchBar" style="display:none;">

    <span class="search-tag active" data-mode="all" onclick="setSearchMode('all')">전체</span>
    <span class="search-tag" data-mode="product" onclick="setSearchMode('product')">상품</span>
    <span class="search-tag" data-mode="schedule" onclick="setSearchMode('schedule')">일정</span>
  </div>
  <button class="search-clear" onclick="clearSearch()">초기화</button>
</div>

<!-- SEARCH RESULTS -->
<div class="search-results" id="searchResults"></div>

<!-- SUMMARY BAR -->
<div class="summary-bar" id="summaryBar" style="display:none;">
  <div class="summary-item done">
    <span class="summary-count" id="cntDone">0</span>
    <span class="summary-label">업로드 완료</span>
  </div>
  <div class="summary-item scheduled">
    <span class="summary-count" id="cntSched">0</span>
    <span class="summary-label">업로드 예정</span>
  </div>
  <div class="summary-item draft">
    <span class="summary-count" id="cntDraft">0</span>
    <span class="summary-label">보류</span>
  </div>
  <div class="summary-item total">
    <span class="summary-count" id="cntTotal">0</span>
    <span class="summary-label">이번달 전체</span>
  </div>
  <div class="last-updated" id="lastUpdated"></div>
</div>

<!-- MONTH NAV -->
<div class="month-nav" id="monthNav" style="display:none;">
  <div class="month-controls">
    <div class="year-month-display" id="yearMonthDisplay"></div>
    <select class="year-select" id="yearSelect" onchange="onYearChange()"></select>
    <select class="month-select" id="monthSelect" onchange="onMonthChange()"></select>
  </div>
  <div class="month-controls">
    <button class="nav-btn" onclick="changeMonth(-1)">←</button>
    <button class="nav-btn today" onclick="goToToday()">TODAY</button>
    <button class="nav-btn" onclick="changeMonth(1)">→</button>
    <button class="refresh-btn" id="refreshBtn" onclick="loadFromSheets()">↻ 새로고침</button>
  </div>
</div>

<!-- CALENDAR -->
<div class="calendar-wrap">
  <div id="calContent"></div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="detailTitle">상세</span>
      <button class="modal-close" onclick="closeModal('detailModal')">×</button>
    </div>
    <div id="detailContent"></div>
    <div class="modal-footer">
      <a href="#" target="_blank" class="modal-btn primary" id="editSheetBtn">📝 시트에서 수정</a>
      <button class="modal-btn" onclick="closeModal('detailModal')">닫기</button>
    </div>
  </div>
</div>

<!-- REPORT MODAL -->
<div class="modal-overlay" id="reportModal">
  <div class="modal wide">
    <div class="modal-header">
      <span class="modal-title">Annual Report</span>
      <button class="modal-close" onclick="closeModal('reportModal')">×</button>
    </div>
    <div id="reportContent"></div>
  </div>
</div>

<script>
/* =========================================================
   기본 설정
   ========================================================= */
const SHEET_EDIT_URL = "https://docs.google.com/spreadsheets/d/1L-M36PIt3xd52FnkDE5wtJ68omApqtG5SpRtOs8tcmA/edit";

const DEFAULT_CONFIG = {
  PRODUCT_CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQv9LaUTg3QPyVHcBvACBkzCDxPPwSauRckCIJABUjfyInMAQB7o4xShrsksqFoJ-E-9-HeO4GXYH9/pub?gid=0&single=true&output=csv",
  SCHEDULE_CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQv9LaUTg3QPyVHcBvACBkzCDxPPwSauRckCIJABUjfyInMAQB7o4xShrsksqFoJ-E-9-HeO4GXYH9/pub?gid=1585667082&single=true&output=csv",
  CATEGORY_CSV_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTQv9LaUTg3QPyVHcBvACBkzCDxPPwSauRckCIJABUjfyInMAQB7o4xShrsksqFoJ-E-9-HeO4GXYH9/pub?gid=354426527&single=true&output=csv"
};

const SHEET_CONFIG = {
  PRODUCT_CSV_URL: DEFAULT_CONFIG.PRODUCT_CSV_URL,
  SCHEDULE_CSV_URL: DEFAULT_CONFIG.SCHEDULE_CSV_URL,
  CATEGORY_CSV_URL: DEFAULT_CONFIG.CATEGORY_CSV_URL
};

/* =========================================================
   한국 공휴일 (2025-2027) — "대체공휴일" 완전 표기
   ========================================================= */
const KR_HOLIDAYS = {
  "2025-01-01": "신정",
  "2025-01-28": "설날 연휴", "2025-01-29": "설날", "2025-01-30": "설날 연휴",
  "2025-03-01": "삼일절", "2025-03-03": "삼일절 대체공휴일",
  "2025-05-05": "어린이날/석가탄신일", "2025-05-06": "대체공휴일",
  "2025-06-06": "현충일", "2025-08-15": "광복절", "2025-10-03": "개천절",
  "2025-10-06": "추석 연휴", "2025-10-07": "추석", "2025-10-08": "추석 연휴",
  "2025-10-09": "한글날", "2025-12-25": "성탄절",
  "2026-01-01": "신정",
  "2026-02-16": "설날 연휴", "2026-02-17": "설날", "2026-02-18": "설날 연휴",
  "2026-03-01": "삼일절", "2026-03-02": "삼일절 대체공휴일",
  "2026-05-05": "어린이날", "2026-05-24": "석가탄신일", "2026-05-25": "석가탄신일 대체공휴일",
  "2026-06-06": "현충일", "2026-08-15": "광복절", "2026-08-17": "광복절 대체공휴일",
  "2026-09-24": "추석 연휴", "2026-09-25": "추석", "2026-09-26": "추석 연휴",
  "2026-10-03": "개천절", "2026-10-05": "개천절 대체공휴일",
  "2026-10-09": "한글날", "2026-12-25": "성탄절",
  "2027-01-01": "신정",
  "2027-02-06": "설날 연휴", "2027-02-07": "설날", "2027-02-08": "설날 연휴",
  "2027-02-09": "설날 대체공휴일",
  "2027-03-01": "삼일절",
  "2027-05-05": "어린이날", "2027-05-13": "석가탄신일",
  "2027-06-06": "현충일", "2027-06-07": "현충일 대체공휴일",
  "2027-08-15": "광복절", "2027-08-16": "광복절 대체공휴일",
  "2027-09-14": "추석 연휴", "2027-09-15": "추석", "2027-09-16": "추석 연휴",
  "2027-10-03": "개천절", "2027-10-04": "개천절 대체공휴일",
  "2027-10-09": "한글날", "2027-10-11": "한글날 대체공휴일",
  "2027-12-25": "성탄절"
};

/* =========================================================
   상태
   ========================================================= */
let currentYear, currentMonth;
let products = [];
let schedules = [];
let categoryMap = { categoryByCode: {}, subcategoryByCode: {}, all: [] };
let productRowMap = {}; // 상품코드 -> 시트 행 번호
let searchKeyword = '';
let searchMode = 'all';
let highlightTarget = null;
const today = new Date();

/* =========================================================
   초기화
   ========================================================= */
function init() {
  currentYear = today.getFullYear();
  currentMonth = today.getMonth();

  const savedP = localStorage.getItem('nuinu_product_url');
  const savedS = localStorage.getItem('nuinu_schedule_url');
  const savedC = localStorage.getItem('nuinu_category_url');
  if (savedP) SHEET_CONFIG.PRODUCT_CSV_URL = savedP;
  if (savedS) SHEET_CONFIG.SCHEDULE_CSV_URL = savedS;
  if (savedC) SHEET_CONFIG.CATEGORY_CSV_URL = savedC;

  renderCalendarShell();
  loadFromSheets();
}

function renderCalendarShell() {
  document.getElementById('calContent').innerHTML = `
    <div class="weekdays">
      <div class="weekday sun">SUN</div>
      <div class="weekday">MON</div><div class="weekday">TUE</div>
      <div class="weekday">WED</div><div class="weekday">THU</div>
      <div class="weekday">FRI</div>
      <div class="weekday sat">SAT</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  `;
  document.getElementById('summaryBar').style.display = 'flex';
  document.getElementById('monthNav').style.display = 'flex';
  document.getElementById('searchBar').style.display = 'flex';
  populateYearMonthSelects();
}

function populateYearMonthSelects() {
  const yearSel = document.getElementById('yearSelect');
  const monthSel = document.getElementById('monthSelect');
  yearSel.innerHTML = '';
  const startYear = today.getFullYear() - 3;
  const endYear = today.getFullYear() + 5;
  for (let y = startYear; y <= endYear; y++) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y + '년';
    if (y === currentYear) opt.selected = true;
    yearSel.appendChild(opt);
  }
  monthSel.innerHTML = '';
  for (let m = 0; m < 12; m++) {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = (m+1) + '월';
    if (m === currentMonth) opt.selected = true;
    monthSel.appendChild(opt);
  }
}

function onYearChange() { currentYear = parseInt(document.getElementById('yearSelect').value); renderCalendar(); }
function onMonthChange() { currentMonth = parseInt(document.getElementById('monthSelect').value); renderCalendar(); }

/* =========================================================
   설정 패널
   ========================================================= */
function showConfigPanel() {
  const p = SHEET_CONFIG.PRODUCT_CSV_URL || '';
  const s = SHEET_CONFIG.SCHEDULE_CSV_URL || '';
  const c = SHEET_CONFIG.CATEGORY_CSV_URL || '';
  document.getElementById('calContent').innerHTML = `
    <div class="config-panel">
      <h2>SHEET SETTINGS</h2>
      <p class="config-desc">구글 시트 주소를 변경할 수 있습니다. 비워두면 기본값이 사용됩니다.</p>

      <label>📦 상품 시트 URL</label>
      <input type="text" id="productUrlInput" placeholder="https://docs.google.com/..." value="${p}">

      <label>📅 일정 시트 URL</label>
      <input type="text" id="scheduleUrlInput" placeholder="https://docs.google.com/..." value="${s}">

      <label>🏷️ 카테고리 시트 URL</label>
      <input type="text" id="categoryUrlInput" placeholder="https://docs.google.com/..." value="${c}">

      <div class="btn-row">
        <button onclick="saveSheetUrls()">저장</button>
        <button class="cancel" onclick="cancelConfig()">취소</button>
        <button class="cancel" onclick="resetToDefault()" style="color:var(--holiday);border-color:var(--holiday);">기본값으로 복원</button>
      </div>
    </div>
  `;
  document.getElementById('summaryBar').style.display = 'none';
  document.getElementById('monthNav').style.display = 'none';
  document.getElementById('searchBar').style.display = 'none';
  document.getElementById('searchResults').classList.remove('active');
}

function saveSheetUrls() {
  const p = document.getElementById('productUrlInput').value.trim() || DEFAULT_CONFIG.PRODUCT_CSV_URL;
  const s = document.getElementById('scheduleUrlInput').value.trim() || DEFAULT_CONFIG.SCHEDULE_CSV_URL;
  const c = document.getElementById('categoryUrlInput').value.trim() || DEFAULT_CONFIG.CATEGORY_CSV_URL;
  SHEET_CONFIG.PRODUCT_CSV_URL = p;
  SHEET_CONFIG.SCHEDULE_CSV_URL = s;
  SHEET_CONFIG.CATEGORY_CSV_URL = c;
  localStorage.setItem('nuinu_product_url', p);
  localStorage.setItem('nuinu_schedule_url', s);
  localStorage.setItem('nuinu_category_url', c);
  renderCalendarShell();
  loadFromSheets();
}

function resetToDefault() {
  if (!confirm('모든 URL을 기본값으로 복원하시겠어요?')) return;
  localStorage.removeItem('nuinu_product_url');
  localStorage.removeItem('nuinu_schedule_url');
  localStorage.removeItem('nuinu_category_url');
  SHEET_CONFIG.PRODUCT_CSV_URL = DEFAULT_CONFIG.PRODUCT_CSV_URL;
  SHEET_CONFIG.SCHEDULE_CSV_URL = DEFAULT_CONFIG.SCHEDULE_CSV_URL;
  SHEET_CONFIG.CATEGORY_CSV_URL = DEFAULT_CONFIG.CATEGORY_CSV_URL;
  renderCalendarShell();
  loadFromSheets();
}

function resetSheetUrl() { showConfigPanel(); }
function cancelConfig() { renderCalendarShell(); renderCalendar(); }

/* =========================================================
   시트 불러오기
   ========================================================= */
async function loadFromSheets() {
  const btn = document.getElementById('refreshBtn');
  if (btn) btn.classList.add('loading');

  try {
    // 카테고리
    categoryMap = { categoryByCode: {}, subcategoryByCode: {}, all: [] };
    if (SHEET_CONFIG.CATEGORY_CSV_URL) {
      try {
        const cUrl = SHEET_CONFIG.CATEGORY_CSV_URL + (SHEET_CONFIG.CATEGORY_CSV_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
        const cRes = await fetch(cUrl);
        if (cRes.ok) {
          const cCsv = await cRes.text();
          categoryMap = parseCategoryMap(cCsv);
        }
      } catch(e) { console.warn('카테고리 로드 실패:', e); }
    }

    // 상품
    const pUrl = SHEET_CONFIG.PRODUCT_CSV_URL + (SHEET_CONFIG.PRODUCT_CSV_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
    const pRes = await fetch(pUrl);
    if (!pRes.ok) throw new Error('상품 시트를 불러올 수 없습니다');
    const pCsv = await pRes.text();
    const parsed = parseProducts(pCsv);
    products = parsed.products;
    productRowMap = parsed.rowMap;

    // 일정
    schedules = [];
    if (SHEET_CONFIG.SCHEDULE_CSV_URL) {
      try {
        const sUrl = SHEET_CONFIG.SCHEDULE_CSV_URL + (SHEET_CONFIG.SCHEDULE_CSV_URL.includes('?') ? '&' : '?') + 't=' + Date.now();
        const sRes = await fetch(sUrl);
        if (sRes.ok) {
          const sCsv = await sRes.text();
          schedules = parseSchedules(sCsv);
        }
      } catch(e) { console.warn('일정 로드 실패:', e); }
    }

    renderCalendar();
    document.getElementById('lastUpdated').textContent = '마지막 업데이트: ' + formatTime(new Date());
  } catch (err) {
    const grid = document.getElementById('calGrid');
    if (grid) {
      grid.innerHTML = `
        <div class="error-state" style="grid-column:1/-1;">
          <h3>시트를 불러오지 못했어요</h3>
          <p>시트가 "웹에 게시"되어 있는지, URL이 맞는지 확인해주세요.<br>
          <span style="font-size:11px;opacity:0.7">에러: ${err.message}</span></p>
        </div>
      `;
    }
  } finally {
    if (btn) btn.classList.remove('loading');
  }
}

/* =========================================================
   CSV 파싱
   ========================================================= */
function parseCSV(text) {
  const lines = [];
  let cur = '', inQuotes = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i+1];
    if (ch === '"' && inQuotes && next === '"') { cur += '"'; i++; continue; }
    if (ch === '"') { inQuotes = !inQuotes; continue; }
    if (ch === ',' && !inQuotes) { row.push(cur); cur = ''; continue; }
    if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && next === '\n') i++;
      row.push(cur); lines.push(row); cur = ''; row = []; continue;
    }
    cur += ch;
  }
  if (cur || row.length) { row.push(cur); lines.push(row); }
  if (lines.length < 2) return { headers: [], rows: [] };

  const headers = lines[0].map(h => h.trim());
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const rowArr = lines[i];
    if (!rowArr || rowArr.every(c => !c || !c.trim())) continue;
    const obj = {};
    headers.forEach((h, idx) => obj[h] = (rowArr[idx] || '').trim());
    obj.__rowNum = i + 1; // 시트 행 번호 (헤더 포함 1-index)
    rows.push(obj);
  }
  return { headers, rows };
}

function getField(row, keys) {
  for (const k of keys) {
    for (const key in row) {
      if (key === '__rowNum') continue;
      if (key.replace(/\s/g,'').toLowerCase() === k.replace(/\s/g,'').toLowerCase()) return row[key];
    }
  }
  return '';
}

function parseCategoryMap(csv) {
  const { rows } = parseCSV(csv);
  const map = { categoryByCode: {}, subcategoryByCode: {}, all: [] };
  rows.forEach(row => {
    const keys = Object.keys(row).filter(k => k !== '__rowNum');
    if (keys.length >= 2) {
      const cat = row[keys[0]] || '';
      const catCode = row[keys[1]] || '';
      const sub = keys.length >= 3 ? row[keys[2]] || '' : '';
      const subCode = keys.length >= 4 ? row[keys[3]] || '' : '';
      if (catCode) map.categoryByCode[catCode.toUpperCase()] = cat;
      if (subCode) map.subcategoryByCode[subCode.toUpperCase()] = sub;
      map.all.push({ category: cat, categoryCode: catCode, subcategory: sub, subcategoryCode: subCode });
    }
  });
  return map;
}

function parseProducts(csv) {
  const { headers, rows } = parseCSV(csv);

  // 상품코드 컬럼 인덱스 찾기 (시트 수정 링크용)
  let codeColIdx = -1;
  headers.forEach((h, i) => {
    const normalized = h.replace(/\s/g,'').toLowerCase();
    if (normalized === '상품코드' || normalized === '코드' || normalized === 'code' || normalized === 'productcode') codeColIdx = i;
  });

  const rowMap = {}; // 상품코드 -> { row, col }

  const products = rows.map(row => {
    let status = getField(row, ['상태','status']).toLowerCase();
    if (status.includes('완료') || status.includes('done')) status = 'done';
    else if (status.includes('예정') || status.includes('scheduled')) status = 'scheduled';
    else if (status.includes('보류') || status.includes('준비') || status.includes('draft') || status.includes('hold')) status = 'draft';
    else status = 'scheduled';

    const code = getField(row, ['상품코드','코드','code','productcode']);
    const manualImage = getField(row, ['사진url','사진','이미지','image','imageurl','photo']);

    if (code && codeColIdx >= 0) {
      rowMap[code] = { row: row.__rowNum, col: codeColIdx + 1 };
    }

    return {
      type: 'product',
      date: normalizeDate(getField(row, ['업로드날짜','업로드 날짜','날짜','date','uploaddate'])),
      shipDate: normalizeDate(getField(row, ['선적예정일','선적 예정일','shipdate'])),
      arriveDate: normalizeDate(getField(row, ['입고예정일','입고 예정일','arrivedate','stockdate'])),
      code: code,
      name: getField(row, ['상품명','이름','name','productname']),
      category: getField(row, ['카테고리','category']),
      subcategory: getField(row, ['소분류','subcategory','sub']),
      size: getField(row, ['사이즈','size']),
      color: getField(row, ['색상','컬러','color']),
      status: status,
      image: manualImage ? convertDriveUrl(manualImage) : '',
      vendor: getField(row, ['거래처코드','거래처','메모','vendor','vendorcode','memo','note'])
    };
  }).filter(p => p.date && (p.code || p.image || p.name));

  return { products, rowMap };
}

function parseSchedules(csv) {
  const { rows } = parseCSV(csv);
  return rows.map(row => ({
    type: 'schedule',
    date: normalizeDate(getField(row, ['날짜','date','startdate','시작일'])),
    endDate: normalizeDate(getField(row, ['종료일','enddate','end'])),
    name: getField(row, ['일정명','name','title','일정']),
    category: getField(row, ['카테고리','category']),
    memo: getField(row, ['메모','memo','note'])
  })).filter(s => s.date && s.name);
}

function normalizeDate(d) {
  if (!d) return '';
  d = d.trim();
  const m = d.match(/(\d{4})[\-\.\/\s]+(\d{1,2})[\-\.\/\s]+(\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  return d;
}

function convertDriveUrl(url) {
  if (!url) return '';
  url = url.trim();
  let m = url.match(/\/file\/d\/([^\/\?]+)/);
  if (m) return `https://lh3.googleusercontent.com/d/${m[1]}`;
  m = url.match(/[?&]id=([^&]+)/);
  if (m) return `https://lh3.googleusercontent.com/d/${m[1]}`;
  return url;
}

/* =========================================================
   검색
   ========================================================= */
function setSearchMode(mode) {
  searchMode = mode;
  document.querySelectorAll('.search-tag').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  renderSearchResults();
}

function onSearchInput() {
  searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
  renderSearchResults();
}

function clearSearch() {
  searchKeyword = '';
  searchMode = 'all';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.search-tag').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === 'all');
  });
  renderSearchResults();
}

function matchesSearch(item) {
  if (!searchKeyword) return false;
  if (item.type === 'product') {
    if (searchMode === 'schedule') return false;
    return (item.code || '').toLowerCase().includes(searchKeyword) ||
           (item.name || '').toLowerCase().includes(searchKeyword);
  } else {
    if (searchMode === 'product') return false;
    return (item.category || '').toLowerCase().includes(searchKeyword) ||
           (item.memo || '').toLowerCase().includes(searchKeyword) ||
           (item.name || '').toLowerCase().includes(searchKeyword);
  }
}

function renderSearchResults() {
  const box = document.getElementById('searchResults');
  if (!searchKeyword) {
    box.classList.remove('active');
    box.innerHTML = '';
    return;
  }

  const matchedProducts = products.filter(p => matchesSearch(p));
  const matchedSchedules = schedules.filter(s => matchesSearch(s));
  const total = matchedProducts.length + matchedSchedules.length;

  box.classList.add('active');

  if (total === 0) {
    box.innerHTML = `
      <div class="search-results-header">🔍 "${escapeHtml(searchKeyword)}" 검색결과: 0건</div>
      <div style="padding:30px 40px;text-align:center;color:var(--mid-gray);font-weight:700;font-size:13px;">
        일치하는 항목이 없습니다.
      </div>
    `;
    return;
  }

  const statusLabels = { done: '완료', scheduled: '예정', draft: '보류' };
  let html = `<div class="search-results-header">🔍 "${escapeHtml(searchKeyword)}" 검색결과: ${total}건 (상품 ${matchedProducts.length} / 일정 ${matchedSchedules.length}) — 클릭하면 해당 날짜로 이동</div>`;

  matchedProducts.forEach((p, idx) => {
    const thumb = p.image
      ? `<img class="search-thumb" src="${p.image}" onerror="this.style.display='none'">`
      : `<div class="search-thumb-placeholder">${(p.code||'').substring(0,2) || '—'}</div>`;
    html += `
      <div class="search-result-item" onclick="jumpToItem('product', ${idx})">
        ${thumb}
        <div class="search-result-info">
          <div class="search-result-code">${escapeHtml(p.code || '코드없음')}</div>
          <div class="search-result-name">${escapeHtml(p.name || '(상품명 없음)')}</div>
          <div class="search-result-meta">업로드 ${p.date}${p.arriveDate ? ' · 입고 ' + p.arriveDate : ''}</div>
        </div>
        <span class="search-result-badge status-badge ${p.status}">${statusLabels[p.status]}</span>
      </div>
    `;
  });

  matchedSchedules.forEach((s, idx) => {
    html += `
      <div class="search-result-item" onclick="jumpToItem('schedule', ${idx})">
        <div class="search-thumb-schedule">📅</div>
        <div class="search-result-info">
          <div class="search-result-code">${escapeHtml(s.category || '일정')}</div>
          <div class="search-result-name">${escapeHtml(s.name)}</div>
          <div class="search-result-meta">${s.date}${s.endDate && s.endDate !== s.date ? ' ~ ' + s.endDate : ''}${s.memo ? ' · ' + escapeHtml(s.memo) : ''}</div>
        </div>
        <span class="search-result-badge status-badge schedule">일정</span>
      </div>
    `;
  });

  box.innerHTML = html;

  // 컨텍스트용 매칭 배열 저장
  window._searchMatchedProducts = matchedProducts;
  window._searchMatchedSchedules = matchedSchedules;
}

function jumpToItem(type, idx) {
  const item = type === 'product' 
    ? window._searchMatchedProducts?.[idx]
    : window._searchMatchedSchedules?.[idx];
  if (!item) return;

  const date = item.date;
  const m = date.match(/(\d{4})-(\d{2})/);
  if (!m) return;

  const targetYear = parseInt(m[1]);
  const targetMonth = parseInt(m[2]) - 1;

  currentYear = targetYear;
  currentMonth = targetMonth;
  document.getElementById('yearSelect').value = currentYear;
  document.getElementById('monthSelect').value = currentMonth;

  highlightTarget = { type, key: type === 'product' ? item.code : item.name + '|' + item.date, date };
  renderCalendar();

  // 스크롤
  setTimeout(() => {
    document.querySelector('.calendar-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

/* =========================================================
   달력 렌더
   ========================================================= */
function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  document.getElementById('yearSelect').value = currentYear;
  document.getElementById('monthSelect').value = currentMonth;
  renderCalendar();
}

function goToToday() {
  currentYear = today.getFullYear();
  currentMonth = today.getMonth();
  document.getElementById('yearSelect').value = currentYear;
  document.getElementById('monthSelect').value = currentMonth;
  renderCalendar();
}

function renderCalendar() {
  const monthNames = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  document.getElementById('yearMonthDisplay').textContent = `${monthNames[currentMonth]} ${currentYear}`;

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const daysInPrev = new Date(currentYear, currentMonth, 0).getDate();

  const grid = document.getElementById('calGrid');
  if (!grid) return;
  grid.innerHTML = '';

  const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  const allCells = [];

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day';
    let dayNum, isCurrentMonth = true, displayYear = currentYear, displayMonth = currentMonth;

    if (i < firstDay) {
      dayNum = daysInPrev - firstDay + i + 1;
      isCurrentMonth = false;
      displayMonth = currentMonth - 1;
      if (displayMonth < 0) { displayMonth = 11; displayYear--; }
      cell.classList.add('other-month');
    } else if (i >= firstDay + daysInMonth) {
      dayNum = i - firstDay - daysInMonth + 1;
      isCurrentMonth = false;
      displayMonth = currentMonth + 1;
      if (displayMonth > 11) { displayMonth = 0; displayYear++; }
      cell.classList.add('other-month');
    } else {
      dayNum = i - firstDay + 1;
    }

    const weekday = i % 7;
    const dateStr = `${displayYear}-${String(displayMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    const holiday = KR_HOLIDAYS[dateStr];

    if (holiday && isCurrentMonth) cell.classList.add('holiday-day');
    if (isCurrentMonth && dayNum === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()) {
      cell.classList.add('today');
    }

    const dayHeader = document.createElement('div');
    dayHeader.className = 'day-header';
    const numEl = document.createElement('span');
    numEl.className = 'day-num';
    if (weekday === 0 || holiday) numEl.classList.add('sun');
    else if (weekday === 6) numEl.classList.add('sat');
    numEl.textContent = dayNum;
    dayHeader.appendChild(numEl);

    if (holiday && isCurrentMonth) {
      const hLabel = document.createElement('span');
      hLabel.className = 'holiday-label';
      hLabel.textContent = holiday;
      dayHeader.appendChild(hLabel);
    }
    cell.appendChild(dayHeader);

    cell.dataset.date = dateStr;
    cell.dataset.weekday = weekday;
    cell.dataset.isCurrent = isCurrentMonth;

    allCells.push({ cell, dateStr, weekday, isCurrentMonth, cellIdx: i });
    grid.appendChild(cell);
  }

  // 일정을 먼저 렌더
  renderSchedulesConnected(allCells, grid);
  // 상품
  renderProducts(allCells);

  updateSummary();
  applyHighlight();
}

/* =========================================================
   연결된 일정 바 렌더
   ========================================================= */
function renderSchedulesConnected(allCells, grid) {
  if (allCells.length === 0) return;
  const firstDate = allCells[0].dateStr;
  const lastDate = allCells[allCells.length - 1].dateStr;

  // 표시 범위의 일정만
  const visible = schedules.filter(s => {
    const sEnd = s.endDate || s.date;
    return sEnd >= firstDate && s.date <= lastDate;
  });

  // 각 주별로 처리
  const rowsInWeek = {}; // weekIdx -> 이미 사용된 row 슬롯
  const weekCount = Math.ceil(allCells.length / 7);
  for (let w = 0; w < weekCount; w++) rowsInWeek[w] = [];

  // 일정을 시작일 기준 정렬 + 긴 일정 먼저
  visible.sort((a, b) => {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    const aLen = (a.endDate || a.date).localeCompare(a.date);
    const bLen = (b.endDate || b.date).localeCompare(b.date);
    return bLen - aLen;
  });

  // 레이어 준비 (주별)
  const weekLayers = [];
  for (let w = 0; w < weekCount; w++) {
    const layer = document.createElement('div');
    layer.style.position = 'absolute';
    layer.style.left = '0';
    layer.style.right = '0';
    layer.style.pointerEvents = 'none';
    weekLayers.push(layer);
  }

  // 일정별로 각 주 범위 찾기
  visible.forEach(sch => {
    const sStart = sch.date;
    const sEnd = sch.endDate || sch.date;

    for (let w = 0; w < weekCount; w++) {
      const wStart = w * 7;
      const wEnd = Math.min(wStart + 6, allCells.length - 1);
      const weekStartDate = allCells[wStart].dateStr;
      const weekEndDate = allCells[wEnd].dateStr;

      if (sEnd < weekStartDate || sStart > weekEndDate) continue;

      // 이 주에서 차지하는 칼럼 범위
      let startCol = 0, endCol = 6;
      for (let c = 0; c <= 6; c++) {
        if (allCells[wStart + c].dateStr >= sStart) { startCol = c; break; }
      }
      for (let c = 6; c >= 0; c--) {
        if (allCells[wStart + c] && allCells[wStart + c].dateStr <= sEnd) { endCol = c; break; }
      }

      // 사용할 row 슬롯 찾기 (겹치지 않는 row)
      let slotIdx = 0;
      while (true) {
        const usedSlots = rowsInWeek[w][slotIdx] || [];
        const overlap = usedSlots.some(([s, e]) => !(endCol < s || startCol > e));
        if (!overlap) {
          if (!rowsInWeek[w][slotIdx]) rowsInWeek[w][slotIdx] = [];
          rowsInWeek[w][slotIdx].push([startCol, endCol]);
          break;
        }
        slotIdx++;
      }

      const isStart = sStart >= weekStartDate;
      const isEnd = sEnd <= weekEndDate;

      // 바 DOM 생성
      const bar = document.createElement('div');
      bar.className = 'schedule-row';
      const barInner = document.createElement('div');
      barInner.className = 'schedule-row-bar';
      if (isStart) barInner.classList.add('has-left', 'rounded-left');
      if (isEnd) barInner.classList.add('rounded-right');
      barInner.textContent = sch.name;
      bar.appendChild(barInner);
      bar.onclick = (e) => { e.stopPropagation(); openDetail(sch); };
      bar.dataset.schKey = sch.name + '|' + sch.date;

      // 위치 계산 (그리드 기준 %)
      const leftPct = (startCol / 7) * 100;
      const widthPct = ((endCol - startCol + 1) / 7) * 100;
      bar.style.position = 'absolute';
      bar.style.left = `calc(${leftPct}% + 2px)`;
      bar.style.width = `calc(${widthPct}% - 4px)`;
      bar.style.top = `${32 + slotIdx * 24}px`;
      bar.style.pointerEvents = 'auto';

      weekLayers[w].appendChild(bar);
    }
  });

  // 주별 레이어를 첫 셀에 배치
  for (let w = 0; w < weekCount; w++) {
    if (weekLayers[w].children.length === 0) continue;
    const wStart = w * 7;
    const row = allCells[wStart].cell;
    // 주 높이 전체를 덮도록
    weekLayers[w].style.height = '200px';
    allCells[wStart].cell.style.position = 'relative';
    // 주 전체 너비에 걸치는 레이어
    const spanner = document.createElement('div');
    spanner.style.position = 'absolute';
    spanner.style.left = '0';
    spanner.style.top = '0';
    spanner.style.width = `${700}%`;
    spanner.style.height = '100%';
    spanner.style.pointerEvents = 'none';
    spanner.style.zIndex = '3';
    spanner.appendChild(weekLayers[w]);
    weekLayers[w].style.position = 'absolute';
    weekLayers[w].style.left = '0';
    weekLayers[w].style.top = '0';
    weekLayers[w].style.width = '100%';
    weekLayers[w].style.height = '100%';
    allCells[wStart].cell.appendChild(spanner);
  }

  // 각 셀의 상품 영역 위쪽 패딩 조정 (바가 있는 경우)
  for (let w = 0; w < weekCount; w++) {
    const maxSlot = (rowsInWeek[w] || []).length;
    if (maxSlot === 0) continue;
    const topPad = maxSlot * 24 + 4;
    for (let c = 0; c < 7; c++) {
      const idx = w * 7 + c;
      if (allCells[idx]) {
        allCells[idx].scheduleTopPad = topPad;
      }
    }
  }
}

/* =========================================================
   상품 렌더
   ========================================================= */
function renderProducts(allCells) {
  allCells.forEach(({ cell, dateStr, isCurrentMonth, scheduleTopPad }) => {
    if (!isCurrentMonth) return;

    const dayProducts = products.filter(p => p.date === dateStr);
    if (dayProducts.length === 0) return;

    const cardsWrap = document.createElement('div');
    cardsWrap.className = 'product-cards';
    if (scheduleTopPad) cardsWrap.style.marginTop = (scheduleTopPad - 4) + 'px';

    const showMax = 3;
    dayProducts.slice(0, showMax).forEach(p => {
      cardsWrap.appendChild(makeProductCard(p));
    });

    if (dayProducts.length > showMax) {
      const more = document.createElement('div');
      more.className = 'more-badge';
      more.textContent = `+${dayProducts.length - showMax} 더보기`;
      more.addEventListener('click', () => openDayList(dateStr, dayProducts));
      cardsWrap.appendChild(more);
    }

    cell.appendChild(cardsWrap);
  });
}

function makeProductCard(item) {
  const card = document.createElement('div');
  card.className = `product-card ${item.status}`;
  card.title = `${item.code || ''} ${item.name || ''}`;
  card.dataset.productCode = item.code || '';

  if (item.image) {
    const img = document.createElement('img');
    img.className = 'card-thumb';
    img.src = item.image;
    img.onerror = () => { img.style.display = 'none'; };
    card.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'card-thumb-placeholder';
    ph.textContent = (item.code && item.code.length >= 2) ? item.code.substring(0,2) : '—';
    card.appendChild(ph);
  }

  const info = document.createElement('div');
  info.className = 'card-info';
  const code = item.code || '코드없음';
  const arrive = item.arriveDate ? `입고 ${formatShortDate(item.arriveDate)}` : '';
  info.innerHTML = `<div class="card-code">${escapeHtml(code)}</div>${arrive ? `<div class="card-sub">${escapeHtml(arrive)}</div>` : ''}`;
  card.appendChild(info);

  card.addEventListener('click', (e) => { e.stopPropagation(); openDetail(item); });
  return card;
}

/* =========================================================
   강조 효과
   ========================================================= */
function applyHighlight() {
  if (!highlightTarget) return;
  setTimeout(() => {
    let targetEl = null;
    if (highlightTarget.type === 'product') {
      targetEl = document.querySelector(`.product-card[data-product-code="${CSS.escape(highlightTarget.key)}"]`);
    } else {
      targetEl = document.querySelector(`.schedule-row[data-sch-key="${CSS.escape(highlightTarget.key)}"]`);
    }
    if (targetEl) {
      // 부모 셀 펄스
      const cell = targetEl.closest('.cal-day');
      if (cell) cell.classList.add('highlight-day');
      targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      setTimeout(() => {
        if (cell) cell.classList.remove('highlight-day');
      }, 5500);
    }
    highlightTarget = null;
  }, 200);
}

function formatShortDate(d) {
  if (!d) return '';
  const m = d.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${parseInt(m[2])}/${parseInt(m[3])}`;
  return d;
}

function updateSummary() {
  const monthStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
  const mp = products.filter(p => p.date && p.date.startsWith(monthStr));
  document.getElementById('cntDone').textContent = mp.filter(p=>p.status==='done').length;
  document.getElementById('cntSched').textContent = mp.filter(p=>p.status==='scheduled').length;
  document.getElementById('cntDraft').textContent = mp.filter(p=>p.status==='draft').length;
  document.getElementById('cntTotal').textContent = mp.length;
}

/* =========================================================
   상세 모달
   ========================================================= */
function openDetail(item) {
  const editBtn = document.getElementById('editSheetBtn');

  if (item.type === 'schedule') {
    document.getElementById('detailTitle').textContent = item.name;
    let html = '<div class="detail-body">';
    html += row('종류', `<span class="status-badge schedule">📅 일정</span>`);
    html += row('시작일', item.date);
    html += row('종료일', (item.endDate && item.endDate !== item.date) ? item.endDate : '—', !(item.endDate && item.endDate !== item.date));
    html += row('카테고리', item.category ? escapeHtml(item.category) : '—', !item.category);
    html += row('메모', item.memo ? escapeHtml(item.memo) : '—', !item.memo);
    html += '</div>';
    document.getElementById('detailContent').innerHTML = html;
    editBtn.href = SHEET_EDIT_URL + '?gid=1585667082';
  } else {
    const statusLabels = { done: '업로드 완료', scheduled: '업로드 예정', draft: '보류' };
    // 최상단 제목 = 상품코드
    document.getElementById('detailTitle').textContent = item.code || '상품 상세';

    let html = '';
    if (item.image) {
      html += `<div class="detail-img-wrap"><img src="${item.image}" class="detail-img" onerror="this.parentElement.style.display='none'"></div>`;
    }
    html += `<div class="detail-body">`;
    html += row('상태', `<span class="status-badge ${item.status}">${statusLabels[item.status]}</span>`);
    html += row('상품 코드', item.code ? escapeHtml(item.code) : '—', !item.code);
    html += row('상품명', item.name ? escapeHtml(item.name) : '—', !item.name);
    html += row('업로드 날짜', item.date || '—', !item.date);
    html += row('선적 예정일', item.shipDate || '—', !item.shipDate);
    html += row('입고 예정일', item.arriveDate || '—', !item.arriveDate);
    html += row('카테고리', item.category ? escapeHtml(item.category) : '—', !item.category);
    html += row('소분류', item.subcategory ? escapeHtml(item.subcategory) : '—', !item.subcategory);
    html += row('사이즈', item.size ? escapeHtml(item.size) : '—', !item.size);
    html += row('색상', item.color ? escapeHtml(item.color) : '—', !item.color);
    html += row('거래처코드', item.vendor ? escapeHtml(item.vendor) : '—', !item.vendor);
    html += `</div>`;
    document.getElementById('detailContent').innerHTML = html;

    // 시트 수정 버튼: 해당 상품코드 셀로 이동
    const rowInfo = item.code && productRowMap[item.code];
    if (rowInfo) {
      // gid=0 (상품 탭) + range=R{row}C{col}
      editBtn.href = `${SHEET_EDIT_URL}?gid=0&range=R${rowInfo.row}C${rowInfo.col}`;
    } else {
      editBtn.href = SHEET_EDIT_URL + '?gid=0';
    }
  }
  document.getElementById('detailModal').classList.add('open');
}

function openDayList(dateStr, list) {
  document.getElementById('detailTitle').textContent = dateStr + ' (' + list.length + '건)';
  const statusLabels = { done: '완료', scheduled: '예정', draft: '보류' };
  let html = '<div class="detail-body" style="padding:16px 20px;">';
  list.forEach((item, idx) => {
    const isSchedule = item.type === 'schedule';
    html += `
      <div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--divider);cursor:pointer;" onclick='showFromList(${idx})'>
        ${isSchedule ? 
          `<div style="width:52px;height:52px;background:var(--schedule);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;border-radius:4px;">📅</div>` :
          (item.image ? `<img src="${item.image}" style="width:52px;height:52px;object-fit:cover;background:var(--light-gray);border-radius:4px;" onerror="this.style.display='none'">` : `<div style="width:52px;height:52px;background:var(--light-gray);border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--mid-gray);">${(item.code||'').substring(0,2)}</div>`)
        }
        <div style="flex:1;">
          <div style="font-size:11px;color:var(--mid-gray);font-weight:800;">${isSchedule ? (item.category || '일정') : (item.code || '')}</div>
          <div style="font-size:14px;margin-top:2px;font-weight:700;">${escapeHtml(item.name || '')}</div>
          <div style="margin-top:5px;"><span class="status-badge ${isSchedule ? 'schedule' : item.status}">${isSchedule ? '일정' : statusLabels[item.status]}</span></div>
        </div>
      </div>
    `;
  });
  html += '</div>';
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('open');
  window._currentDayList = list;
  document.getElementById('editSheetBtn').href = SHEET_EDIT_URL;
}

function showFromList(idx) {
  const item = window._currentDayList?.[idx];
  if (!item) return;
  closeModal('detailModal');
  setTimeout(() => openDetail(item), 150);
}

function row(label, val, isEmpty) {
  const cls = isEmpty ? ' class="detail-val empty"' : ' class="detail-val"';
  return `<div class="detail-row"><span class="detail-label">${label}</span><span${cls}>${val}</span></div>`;
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* =========================================================
   연간 리포트
   ========================================================= */
function openReport(year) {
  year = year || currentYear;
  renderReport(year);
  document.getElementById('reportModal').classList.add('open');
}

function renderReport(year) {
  const yearProducts = products.filter(p => p.date && p.date.startsWith(year + '-'));
  const total = yearProducts.length;
  const done = yearProducts.filter(p => p.status === 'done').length;
  const scheduled = yearProducts.filter(p => p.status === 'scheduled').length;
  const hold = yearProducts.filter(p => p.status === 'draft').length;

  const byMonth = Array(12).fill(0);
  yearProducts.forEach(p => {
    const m = parseInt(p.date.split('-')[1]) - 1;
    if (!isNaN(m)) byMonth[m]++;
  });

  const byCodePrefix = {};
  yearProducts.forEach(p => {
    if (!p.code) return;
    const match = p.code.match(/^([A-Za-z가-힣]{2})/);
    const prefix = match ? match[1].toUpperCase() : (p.code.substring(0,2).toUpperCase() || '기타');
    byCodePrefix[prefix] = (byCodePrefix[prefix] || 0) + 1;
  });

  const bySubcategory = {};
  yearProducts.forEach(p => {
    const sub = p.subcategory || '미분류';
    bySubcategory[sub] = (bySubcategory[sub] || 0) + 1;
  });

  const thisY = today.getFullYear();
  let yearOptions = '';
  for (let y = thisY - 2; y <= thisY + 3; y++) {
    yearOptions += `<option value="${y}" ${y === year ? 'selected' : ''}>${y}</option>`;
  }

  const monthNames = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  let monthHtml = '';
  for (let m = 0; m < 12; m++) {
    monthHtml += `
      <div class="report-month">
        <div class="report-month-name">${monthNames[m]}</div>
        <div class="report-month-count">${byMonth[m]}</div>
      </div>
    `;
  }

  const codeEntries = Object.entries(byCodePrefix).sort((a,b) => b[1]-a[1]);
  const maxCode = codeEntries[0]?.[1] || 1;
  let codeHtml = '';
  if (codeEntries.length === 0) {
    codeHtml = '<div style="text-align:center;padding:20px;color:var(--mid-gray);font-size:12px;font-weight:700;">데이터 없음</div>';
  } else {
    codeEntries.forEach(([code, count]) => {
      const catName = categoryMap.categoryByCode?.[code] || '';
      const w = (count / maxCode * 100).toFixed(1);
      codeHtml += `
        <div class="report-bar-row">
          <div class="report-bar-label">${escapeHtml(code)}${catName ? ' (' + escapeHtml(catName) + ')' : ''}</div>
          <div class="report-bar-track"><div class="report-bar-fill" style="width:${w}%"></div></div>
          <div class="report-bar-count">${count}</div>
        </div>
      `;
    });
  }

  const subEntries = Object.entries(bySubcategory).sort((a,b) => b[1]-a[1]);
  const maxSub = subEntries[0]?.[1] || 1;
  let subHtml = '';
  if (subEntries.length === 0) {
    subHtml = '<div style="text-align:center;padding:20px;color:var(--mid-gray);font-size:12px;font-weight:700;">데이터 없음</div>';
  } else {
    subEntries.forEach(([sub, count]) => {
      const w = (count / maxSub * 100).toFixed(1);
      subHtml += `
        <div class="report-bar-row">
          <div class="report-bar-label">${escapeHtml(sub)}</div>
          <div class="report-bar-track"><div class="report-bar-fill" style="width:${w}%"></div></div>
          <div class="report-bar-count">${count}</div>
        </div>
      `;
    });
  }

  document.getElementById('reportContent').innerHTML = `
    <div class="report-hero">
      <div class="report-year">${year}</div>
      <div class="report-label">Annual Performance</div>
      <div class="report-year-picker">
        <select onchange="openReport(parseInt(this.value))">${yearOptions}</select>
      </div>
    </div>
    <div class="report-body">
      <div class="report-stat total">
        <div class="stat-count">${total}</div>
        <div class="stat-label">연간 업로드 총 상품</div>
      </div>
      <div class="report-stat hold">
        <div class="stat-count">${hold}</div>
        <div class="stat-label">연간 보류 상품</div>
      </div>
    </div>
    <div class="report-body" style="padding-top:0;">
      <div class="report-stat" style="border-color:var(--done);">
        <div class="stat-count" style="color:var(--done);">${done}</div>
        <div class="stat-label">업로드 완료</div>
      </div>
      <div class="report-stat" style="border-color:var(--scheduled);">
        <div class="stat-count" style="color:var(--scheduled);">${scheduled}</div>
        <div class="stat-label">업로드 예정</div>
      </div>
    </div>
    <div class="report-section">
      <h3>MONTHLY BREAKDOWN</h3>
      <div class="report-month-grid">${monthHtml}</div>
    </div>
    <div class="report-section">
      <h3>BY CODE PREFIX (상품코드 앞 2글자)</h3>
      <div class="report-bar-list">${codeHtml}</div>
    </div>
    <div class="report-section">
      <h3>BY SUBCATEGORY (소분류)</h3>
      <div class="report-bar-list">${subHtml}</div>
    </div>
  `;
}

function formatTime(d) {
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

init();
</script>
